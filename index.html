<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>3D 網頁遊戲創作模板</title>
<meta name="description" content="可重複使用的單檔 Three.js 遊戲模板，內建空間編輯器與介面編輯器。">
<style>
  :root{
    --panel:#111827;
    --panel-2:#182231;
    --panel-3:#202c3d;
    --line:#35465f;
    --text:#eef4ff;
    --muted:#a9b7c9;
    --accent:#5eead4;
    --accent-2:#f6c453;
    --danger:#fb7185;
    --ok:#8bd17c;
    --canvas:#071018;
    --field:#0b1220;
    --shadow:0 18px 48px rgba(0,0,0,.38);
    --font:Inter,Segoe UI,Arial,sans-serif;
    --mono:"Cascadia Mono","Consolas",monospace;
  }
  *{box-sizing:border-box}
  html,body{width:100%;height:100%;margin:0;overflow:hidden;background:var(--canvas);color:var(--text);font-family:var(--font)}
  body{position:relative;-webkit-user-select:none;user-select:none;touch-action:none}
  input,textarea,select{font:inherit}
  input,textarea{-webkit-user-select:text;user-select:text}
  #game-canvas{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none;background:#071018}
  #ui-stage{position:fixed;inset:0;z-index:20;pointer-events:none}
  .game-ui-element{position:absolute;overflow:hidden;display:flex;align-items:center;justify-content:center;text-align:center;white-space:pre-wrap;pointer-events:none}
  .game-ui-element.is-button,.game-ui-element.is-control-button{pointer-events:auto;cursor:pointer}
  .game-ui-button{width:100%;height:100%;border:1px solid rgba(255,255,255,.24);border-radius:6px;background:rgba(13,20,31,.82);color:inherit;font:inherit;cursor:pointer}
  .game-ui-status{width:100%;height:100%;display:grid;grid-template-rows:auto 1fr;gap:4px;align-items:center;padding:4px}
  .game-ui-status-label{font:700 11px/1 var(--font);text-align:left;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .game-ui-bar{position:relative;width:100%;height:100%;min-height:8px;background:rgba(0,0,0,.42);border:1px solid rgba(255,255,255,.2);border-radius:999px;overflow:hidden}
  .game-ui-fill{position:absolute;left:0;top:0;bottom:0;width:100%;background:linear-gradient(90deg,#8bd17c,#f6c453)}
  #game-toast{position:fixed;left:50%;bottom:22px;z-index:80;transform:translateX(-50%);max-width:min(560px,calc(100vw - 32px));padding:10px 14px;border:1px solid rgba(94,234,212,.42);border-radius:8px;background:rgba(7,16,24,.86);color:#dffefa;font:700 12px/1.35 var(--mono);opacity:0;pointer-events:none;transition:opacity .16s ease}
  #game-toast.show{opacity:1}

  .creator-root{position:fixed;inset:0;z-index:1000;pointer-events:none;color:var(--text);font-family:var(--font)}
  .creator-root[hidden]{display:none}
  .creator-root *{box-sizing:border-box}
  .creator-toolbar{position:absolute;left:12px;right:12px;top:12px;z-index:4;min-height:48px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:8px 10px;border:1px solid rgba(255,255,255,.16);border-radius:8px;background:rgba(17,24,39,.94);box-shadow:var(--shadow);pointer-events:auto}
  .creator-title{font:800 12px/1 var(--font);letter-spacing:.08em;text-transform:uppercase;color:#f7fbff;margin-right:4px}
  .creator-toolbar .spacer{flex:1 1 auto}
  .creator-panel{position:absolute;top:76px;bottom:12px;z-index:3;width:min(374px,calc(50vw - 18px));padding:12px;border:1px solid rgba(255,255,255,.14);border-radius:8px;background:rgba(17,24,39,.96);box-shadow:var(--shadow);pointer-events:auto;overflow:auto}
  .creator-panel.left{left:12px}
  .creator-panel.right{right:12px}
  .creator-panel[hidden]{display:none}
  .creator-panel.float-panel{bottom:auto;resize:both;min-width:300px;min-height:120px;max-width:calc(100vw - 24px);max-height:calc(100vh - 88px);padding:0;overflow:auto}
  .creator-panel.float-panel.is-minimized{height:42px !important;min-height:42px;overflow:hidden;resize:none}
  .creator-panel.float-panel .world-window-content{padding:12px}
  .creator-section{display:flex;flex-direction:column;gap:8px;padding-top:12px;margin-top:12px;border-top:1px solid rgba(255,255,255,.12)}
  .creator-section:first-child{padding-top:0;margin-top:0;border-top:none}
  .creator-section h2{margin:0;color:#f6c453;font:800 12px/1 var(--font);letter-spacing:.08em;text-transform:uppercase}
  .creator-grid{display:grid;gap:7px}
  .creator-grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}
  .creator-grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}
  .creator-grid.four{grid-template-columns:repeat(4,minmax(0,1fr))}
  .creator-palette{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px}
  .creator-list{display:flex;flex-direction:column;gap:6px;max-height:260px;overflow:auto;padding-right:3px}
  .creator-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:6px;align-items:center;padding:8px;border:1px solid rgba(255,255,255,.12);border-radius:8px;background:rgba(255,255,255,.04);cursor:pointer}
  .creator-row:hover{border-color:rgba(94,234,212,.55)}
  .creator-row.is-selected{background:rgba(94,234,212,.12);border-color:var(--accent)}
  .creator-row.is-hidden{opacity:.48}
  .row-title{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font:700 12px/1.2 var(--font)}
  .row-meta{font:700 10px/1 var(--mono);color:var(--muted);text-transform:uppercase}
  button,.button-like{min-height:32px;border:1px solid rgba(255,255,255,.14);border-radius:7px;background:var(--panel-3);color:var(--text);font:800 11px/1 var(--font);letter-spacing:.03em;cursor:pointer;padding:8px 10px}
  button:hover{border-color:rgba(94,234,212,.62)}
  button.is-active{background:var(--accent);border-color:var(--accent);color:#06211d}
  button.primary{background:var(--accent-2);border-color:var(--accent-2);color:#1c1504}
  button.danger{background:rgba(251,113,133,.88);border-color:rgba(251,113,133,.88);color:#2b0710}
  button:disabled{opacity:.45;cursor:not-allowed}
  label{display:flex;flex-direction:column;gap:4px;color:var(--muted);font:800 10px/1 var(--font);letter-spacing:.06em;text-transform:uppercase;min-width:0}
  input,select,textarea{width:100%;min-height:32px;border:1px solid rgba(255,255,255,.14);border-radius:7px;background:var(--field);color:var(--text);padding:7px 8px;font:12px/1.25 var(--mono);outline:none}
  textarea{min-height:68px;resize:vertical}
  input[type="checkbox"]{width:auto;min-height:auto;align-self:flex-start}
  input[type="color"]{padding:2px}
  .inline-check{flex-direction:row;align-items:center;gap:8px;min-height:32px}
  .muted{color:var(--muted);font:11px/1.35 var(--mono);margin:0}
  .status-line{position:absolute;right:12px;bottom:12px;z-index:4;max-width:min(560px,calc(100vw - 24px));padding:9px 11px;border:1px solid rgba(94,234,212,.34);border-radius:8px;background:rgba(7,16,24,.86);color:#dffefa;font:11px/1.35 var(--mono);white-space:pre-wrap;pointer-events:none}
  .ui-editor-layer{position:fixed;inset:0;z-index:1;pointer-events:none}
  .ui-editor-box{position:absolute;border:2px solid rgba(94,234,212,.92);background:rgba(94,234,212,.1);pointer-events:auto;min-width:12px;min-height:12px}
  .ui-editor-box.is-selected{border-color:#f6c453;background:rgba(246,196,83,.12)}
  .ui-editor-label{position:absolute;left:-2px;top:-20px;max-width:220px;padding:2px 5px;border-radius:4px;background:rgba(7,16,24,.92);color:#f7fbff;font:800 10px/1 var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ui-handle{position:absolute;width:12px;height:12px;border:2px solid #071018;border-radius:50%;background:#f6c453}
  .ui-handle.nw{left:-7px;top:-7px;cursor:nwse-resize}
  .ui-handle.ne{right:-7px;top:-7px;cursor:nesw-resize}
  .ui-handle.se{right:-7px;bottom:-7px;cursor:nwse-resize}
  .ui-handle.sw{left:-7px;bottom:-7px;cursor:nesw-resize}
  .modal-backdrop{position:fixed;inset:0;z-index:1300;display:flex;align-items:center;justify-content:center;padding:18px;background:rgba(0,0,0,.58);pointer-events:auto}
  .modal{width:min(820px,calc(100vw - 36px));max-height:calc(100vh - 36px);display:flex;flex-direction:column;gap:10px;padding:14px;border:1px solid rgba(255,255,255,.18);border-radius:8px;background:#111827;box-shadow:var(--shadow)}
  .modal h2{margin:0;color:#f6c453;font:800 13px/1 var(--font);letter-spacing:.08em;text-transform:uppercase}
  .modal textarea{min-height:360px;white-space:pre;overflow:auto}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
  .world-window-titlebar{position:sticky;top:0;z-index:2;display:flex;align-items:center;gap:8px;min-height:38px;padding:8px 9px;border-bottom:1px solid rgba(255,255,255,.12);background:rgba(24,34,49,.98);cursor:move}
  .world-window-title{min-width:0;flex:1 1 auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#f6c453;font:900 12px/1 var(--font);letter-spacing:.07em;text-transform:uppercase}
  .world-window-actions{display:flex;gap:6px;flex:0 0 auto}
  .world-window-actions button{width:28px;min-width:28px;min-height:24px;padding:4px;font-size:12px;line-height:1}
  .world-window-content{min-width:0}
  .world-window-help{color:var(--muted);font:10px/1.35 var(--mono);padding:0 2px 2px}
  .world-toolkit{position:fixed;left:260px;top:calc(100vh - 244px);z-index:1200;display:flex;flex-direction:column;gap:8px;width:min(760px,calc(100vw - 28px));min-width:300px;min-height:120px;max-width:calc(100vw - 24px);max-height:calc(100vh - 88px);padding:0;border:1px solid rgba(94,234,212,.35);border-radius:8px;background:rgba(17,24,39,.94);box-shadow:var(--shadow);pointer-events:auto;resize:both;overflow:auto}
  .world-toolkit[hidden]{display:none}
  .world-toolkit.is-minimized{height:42px !important;min-height:42px;resize:none;overflow:hidden}
  .world-toolkit.is-minimized .world-window-content{display:none}
  .world-toolkit-grid{display:grid;grid-template-columns:repeat(5,minmax(82px,1fr));gap:8px;padding:10px}
  .world-toolkit button{min-height:48px;white-space:normal;line-height:1.15}
  .world-toolkit .world-window-actions button{min-height:24px}
  .world-hint{position:fixed;left:50%;top:78px;z-index:1100;transform:translateX(-50%);max-width:min(720px,calc(100vw - 28px));padding:9px 12px;border:1px solid rgba(246,196,83,.38);border-radius:8px;background:rgba(7,16,24,.86);color:#f7fbff;font:12px/1.45 var(--mono);text-align:center;pointer-events:none}
  .world-hint[hidden]{display:none}
  body.creator-active #ui-stage{z-index:980}
  body.creator-world .game-ui-element{pointer-events:none}
  @media (max-width:900px){
    .creator-toolbar{left:8px;right:8px;top:8px}
    .creator-panel:not(.float-panel){top:70px;bottom:auto;left:8px !important;right:8px !important;width:auto;max-height:38vh}
    .creator-panel.right:not(.float-panel){top:calc(70px + 38vh + 8px)}
    .creator-palette{grid-template-columns:repeat(3,minmax(0,1fr))}
    .status-line{left:8px;right:8px;bottom:8px}
  }
</style>

<body>
<canvas id="game-canvas"></canvas>
<div id="ui-stage"></div>
<div id="game-toast"></div>
<input id="asset-file-input" type="file" accept="image/*" hidden>
<input id="actor-file-input" type="file" accept="image/png,image/*,.png,.glb,.gltf,model/gltf+json,model/gltf-binary" multiple hidden>

<script type="module">
import * as THREE from 'three';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';

const STORAGE_KEY='webGameCreatorTemplate.project.v1';
const DEG=Math.PI/180;
const clamp=(v,min,max)=>Math.max(min,Math.min(max,v));
const snap=(v,size)=>size>0?Math.round(v/size)*size:v;
const deepClone=value=>JSON.parse(JSON.stringify(value));
const uid=prefix=>`${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2,8)}`;
const $=(selector,root=document)=>root.querySelector(selector);
const $$=(selector,root=document)=>Array.from(root.querySelectorAll(selector));
const isEditable=el=>!!el&&['INPUT','TEXTAREA','SELECT'].includes(el.tagName);
const escapeHTML=value=>String(value??'').replace(/[&<>"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
const toNumber=(value,fallback=0)=>Number.isFinite(Number(value))?Number(value):fallback;

const WORLD_TYPE_DEFS={
  block:{label:'方塊',size:{x:1,y:1,z:1},color:'#d8b36a',flags:{collidable:true}},
  floor:{label:'地板',size:{x:6,y:.2,z:6},color:'#4f8f9f',flags:{collidable:true}},
  wall:{label:'牆面',size:{x:4,y:2.5,z:.25},color:'#b7c0cb',flags:{collidable:true}},
  platform:{label:'平台',size:{x:3,y:.35,z:2},color:'#7aa56a',flags:{collidable:true}},
  obstacle:{label:'障礙物',size:{x:1.2,y:1.2,z:1.2},color:'#c77d5a',flags:{collidable:true}},
  destructible:{label:'可破壞物',size:{x:1,y:1,z:1},color:'#e55f6e',flags:{collidable:true,destructible:true}},
  trigger:{label:'觸發區',size:{x:2,y:.35,z:2},color:'#5eead4',flags:{trigger:true}},
  spawn:{label:'出生點',size:{x:.75,y:1.2,z:.75},color:'#8bd17c',flags:{spawn:true}},
  textSign:{label:'文字牌',size:{x:2.4,y:1.1,z:.12},color:'#f5efd6',flags:{interactive:true}},
  interactive:{label:'互動物件',size:{x:1,y:1.3,z:1},color:'#b49cff',flags:{interactive:true,collidable:true}},
  roomPrefab:{label:'完整房間',size:{x:6,y:3,z:6},color:'#8fa6b8',flags:{collidable:true}},
  housePrefab:{label:'斜屋頂小屋',size:{x:4.5,y:3.2,z:4},color:'#d7b06a',flags:{collidable:true}},
  shopPrefab:{label:'店面建築',size:{x:5.2,y:3.4,z:3.8},color:'#c88f78',flags:{collidable:true}},
  towerPrefab:{label:'高樓建築',size:{x:3.8,y:7,z:3.8},color:'#9ca8b5',flags:{collidable:true}},
  stairsPrefab:{label:'一段階梯',size:{x:2.4,y:1.6,z:3.4},color:'#b7c0cb',flags:{collidable:true}},
  platformPrefab:{label:'大型平台',size:{x:5.5,y:2.2,z:4.2},color:'#7aa56a',flags:{collidable:true}}
};
const FACE_KEYS=['px','nx','py','ny','pz','nz'];
const FACE_LABELS={px:'+X',nx:'-X',py:'+Y',ny:'-Y',pz:'+Z',nz:'-Z'};

const UI_TYPE_DEFS={
  text:{label:'文字',w:18,h:5,text:'文字'},
  button:{label:'按鈕',w:13,h:6,text:'按鈕'},
  statusBar:{label:'狀態欄',w:18,h:7,text:'生命'},
  score:{label:'計分欄',w:16,h:5,text:'分數'},
  image:{label:'圖像',w:14,h:14,text:''},
  gameFrame:{label:'遊戲框',w:76,h:74,text:''},
  loadingPanel:{label:'讀取畫面',w:34,h:18,text:'讀取中'},
  resultPanel:{label:'結算畫面',w:36,h:20,text:'結算'},
  controlButton:{label:'操作按鈕',w:12,h:10,text:'互動'},
  decorFrame:{label:'裝飾框',w:24,h:14,text:''}
};
const SCREEN_LABELS={game:'遊戲畫面',loading:'讀取畫面',results:'結算畫面'};
const BIND_LABELS={none:'無',score:'分數',health:'生命',message:'訊息',action:'互動',restart:'重新開始'};
const SKIN_MODE_LABELS={color:'純色',stretch:'拉伸貼圖',repeat:'重複平鋪',single:'單面貼圖',perFace:'每面貼圖'};
const FLAG_LABELS={collidable:'可碰撞',destructible:'可破壞',interactive:'可互動',trigger:'觸發區',spawn:'出生點'};
const ACTOR_ROLE_LABELS={player:'主角',npc:'NPC'};
const ACTOR_MODEL_LABELS={primitive:'基本模型',spriteSequence:'PNG 序列',gltf:'3D 模型'};
const LEGACY_LABELS={
  Block:'方塊',Floor:'地板',Wall:'牆面',Platform:'平台',Obstacle:'障礙物',Destructible:'可破壞物',
  'Trigger Zone':'觸發區','Spawn Point':'出生點','Text Sign':'文字牌',Interactive:'互動物件',
  'Main Floor':'主地板','Player Spawn':'玩家出生點','Back Wall':'後牆','Side Wall':'側牆',
  'Raised Platform':'抬高平台','Breakable Crate':'可破壞箱子','Message Trigger':'訊息觸發區',
  'Player start':'玩家起點','Crate broken':'箱子已破壞','Trigger entered':'進入觸發區',
  'NEW GAME':'新遊戲','Interactive sign':'可互動文字牌',
  Text:'文字',Button:'按鈕','Status Bar':'狀態欄',Score:'分數',Health:'生命',Image:'圖像',
  'Game Frame':'遊戲框','Loading Panel':'讀取面板','Results Panel':'結算面板','Result Panel':'結算面板',
  Loading:'讀取中',Result:'結算','Control Button':'互動按鈕','Decor Frame':'裝飾框',ACT:'互動',
  Message:'訊息'
};
function localizeLegacyString(value){
  return typeof value==='string' ? (LEGACY_LABELS[value]||value) : value;
}
function localizeWorldObject(object){
  object.name=localizeLegacyString(object.name);
  object.logic=object.logic||{};
  object.logic.message=localizeLegacyString(object.logic.message);
  object.logic.text=localizeLegacyString(object.logic.text);
  return object;
}
function localizeUIElement(element){
  element.name=localizeLegacyString(element.name);
  element.text=localizeLegacyString(element.text);
  return element;
}

function makeActorRole(id,patch={}){
  const isPlayer=id==='player';
  return mergeObject({
    id,
    name:isPlayer?'主角':'NPC',
    role:isPlayer?'player':'npc',
    model:{type:'primitive',src:'',fileName:'',sequence:[],frameRate:8,scale:isPlayer?1:0.9,billboard:true},
    actions:[
      {id:'idle',name:'待機',frames:{from:0,to:0},fps:6,loop:true},
      {id:'move',name:'移動',frames:{from:0,to:99},fps:10,loop:true},
      {id:'interact',name:'互動',frames:{from:0,to:99},fps:8,loop:false}
    ],
    interaction:{message:isPlayer?'':'你好',onInteract:'message',affinity:0}
  },patch);
}

function createDefaultActors(){
  return {
    schema:'template.actors',
    version:1,
    selectedRole:'player',
    roles:{
      player:makeActorRole('player',{name:'主角'}),
      npc:makeActorRole('npc',{name:'NPC'})
    },
    npcs:[
      {id:'npc_sample',actorId:'npc',name:'測試 NPC',position:{x:1.8,y:0.75,z:1.8},rotation:{x:0,y:0,z:0},radius:0.75,enabled:true}
    ]
  };
}

function normalizeActors(actors){
  const fallback=createDefaultActors();
  if(!actors||typeof actors!=='object') return fallback;
  return {
    schema:'template.actors',
    version:1,
    selectedRole:actors.selectedRole||'player',
    roles:{
      player:makeActorRole('player',actors.roles?.player||{}),
      npc:makeActorRole('npc',actors.roles?.npc||{})
    },
    npcs:Array.isArray(actors.npcs)?actors.npcs.map(npc=>({
      id:npc.id||uid('npc'),
      actorId:npc.actorId||'npc',
      name:npc.name||'NPC',
      position:{x:toNumber(npc.position?.x,1.8),y:toNumber(npc.position?.y,.75),z:toNumber(npc.position?.z,1.8)},
      rotation:{x:toNumber(npc.rotation?.x,0),y:toNumber(npc.rotation?.y,0),z:toNumber(npc.rotation?.z,0)},
      radius:toNumber(npc.radius,.75),
      enabled:npc.enabled!==false
    })):fallback.npcs
  };
}

function makeWorldObject(type,patch={}){
  const def=WORLD_TYPE_DEFS[type]||WORLD_TYPE_DEFS.block;
  const size=deepClone(def.size);
  const flags={collidable:false,destructible:false,interactive:false,trigger:false,spawn:false,...def.flags,...patch.flags};
  const object={
    id:patch.id||uid('wo'),
    type,
    name:patch.name||def.label,
    transform:{
      position:{x:0,y:size.y*.5,z:0},
      rotation:{x:0,y:0,z:0},
      scale:{x:1,y:1,z:1}
    },
    size,
    material:{
      color:def.color,
      opacity:flags.trigger ? .35 : 1,
      skin:{mode:'color',src:'',repeat:{x:1,y:1},singleFace:'pz',faces:{}}
    },
    flags,
    logic:{health:flags.destructible?3:1,message:def.label,text:type==='textSign'?'文字':''}
  };
  return mergeObject(object,patch);
}

function mergeObject(base,patch){
  for(const [key,value] of Object.entries(patch||{})){
    if(value&&typeof value==='object'&&!Array.isArray(value)&&base[key]&&typeof base[key]==='object'&&!Array.isArray(base[key])){
      base[key]=mergeObject({...base[key]},value);
    }else{
      base[key]=value;
    }
  }
  return base;
}

function createDefaultWorld(){
  const objects=[];

  const spawnPoint=makeWorldObject('spawn',{id:'spawn_player',name:'玩家出生點',transform:{position:{x:0,y:.6,z:4},rotation:{x:0,y:0,z:0},scale:{x:1,y:1,z:1}},logic:{message:'玩家起點'}});

  const wallB=makeWorldObject('wall',{id:'wall_left',name:'側牆',size:{x:.25,y:2.5,z:5},transform:{position:{x:-5,y:1.25,z:-1.5},rotation:{x:0,y:0,z:0},scale:{x:1,y:1,z:1}}});
  const platform=makeWorldObject('platform',{id:'platform_sample',name:'抬高平台',transform:{position:{x:3,y:.18,z:0},rotation:{x:0,y:0,z:0},scale:{x:1,y:1,z:1}}});
  const crate=makeWorldObject('destructible',{id:'crate_sample',name:'可破壞箱子',transform:{position:{x:-2,y:.5,z:0},rotation:{x:0,y:0,z:0},scale:{x:1,y:1,z:1}},logic:{health:3,message:'箱子已破壞'}});

function makeUIElement(type,patch={}){
  const def=UI_TYPE_DEFS[type]||UI_TYPE_DEFS.text;
  const element={
    id:patch.id||uid('ui'),
    type,
    screen:patch.screen||'game',
    name:patch.name||def.label,
    x:patch.x??8,
    y:patch.y??8,
    w:patch.w??def.w,
    h:patch.h??def.h,
    z:patch.z??10,
    visible:patch.visible!==false,
    locked:!!patch.locked,
    text:patch.text??def.text,
    fontSize:patch.fontSize??18,
    color:patch.color||'#eef4ff',
    bgColor:patch.bgColor||'rgba(17,24,39,0.72)',
    opacity:patch.opacity??1,
    image:patch.image||'',
    borderColor:patch.borderColor||'rgba(255,255,255,0.24)',
    radius:patch.radius??6,
    bind:patch.bind||'none',
    frameAspect:patch.frameAspect||'16:9'
  };
  return mergeObject(element,patch);
}

function normalizeProject(project){
  const fallback={version:1,world:createDefaultWorld(),ui:createDefaultUI(),actors:createDefaultActors()};
  if(!project||typeof project!=='object') return fallback;
  return {
    version:1,
    world:normalizeWorld(project.world||project),
    ui:normalizeUI(project.ui),
    actors:normalizeActors(project.actors)
  };
}

function normalizeWorld(world){
  const fallback=createDefaultWorld();
  if(!world||typeof world!=='object') return fallback;
  const objects=Array.isArray(world.objects)?world.objects:[];
  return {
    schema:'template.world',
    version:1,
    settings:{...fallback.settings,...world.settings},
    objects:objects.map(raw=>{
      const type=WORLD_TYPE_DEFS[raw.type]?raw.type:'block';
      return localizeWorldObject(makeWorldObject(type,raw));
    })
  };
}

function normalizeUI(ui){
  const fallback=createDefaultUI();
  if(!ui||typeof ui!=='object') return fallback;
  const elements=Array.isArray(ui.elements)?ui.elements:[];
  return {
    schema:'template.ui',
    version:1,
    settings:{...fallback.settings,...ui.settings},
    elements:elements.map(raw=>{
      const type=UI_TYPE_DEFS[raw.type]?raw.type:'text';
      return localizeUIElement(makeUIElement(type,raw));
    })
  };
}

class HistoryStack{
  constructor(getSnapshot,applySnapshot){
    this.getSnapshot=getSnapshot;
    this.applySnapshot=applySnapshot;
    this.undoStack=[];
    this.redoStack=[];
    this.limit=80;
  }
  capture(){
    this.undoStack.push(this.getSnapshot());
    if(this.undoStack.length>this.limit) this.undoStack.shift();
    this.redoStack.length=0;
  }
  undo(){
    if(!this.undoStack.length) return false;
    this.redoStack.push(this.getSnapshot());
    this.applySnapshot(this.undoStack.pop());
    return true;
  }
  redo(){
    if(!this.redoStack.length) return false;
    this.undoStack.push(this.getSnapshot());
    this.applySnapshot(this.redoStack.pop());
    return true;
  }
}

class TextureBank{
  constructor(){
    this.loader=new THREE.TextureLoader();
    this.cache=new Map();
  }
  texture(src,{repeat={x:1,y:1},wrap=false}={}){
    if(!src) return null;
    const key=`${src}|${repeat.x}|${repeat.y}|${wrap}`;
    if(this.cache.has(key)) return this.cache.get(key);
    const texture=this.loader.load(src);
    texture.colorSpace=THREE.SRGBColorSpace;
    texture.wrapS=wrap?THREE.RepeatWrapping:THREE.ClampToEdgeWrapping;
    texture.wrapT=wrap?THREE.RepeatWrapping:THREE.ClampToEdgeWrapping;
    texture.repeat.set(Math.max(.01,repeat.x||1),Math.max(.01,repeat.y||1));
    texture.needsUpdate=true;
    this.cache.set(key,texture);
    return texture;
  }
  textTexture(text,{fg='#172033',bg='#f5efd6'}={}){
    const canvas=document.createElement('canvas');
    canvas.width=1024;
    canvas.height=512;
    const ctx=canvas.getContext('2d');
    ctx.fillStyle=bg;
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle=fg;
    ctx.lineWidth=18;
    ctx.strokeRect(16,16,canvas.width-32,canvas.height-32);
    ctx.fillStyle=fg;
    ctx.font='800 74px Arial, sans-serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    const lines=String(text||'TEXT').split(/\n/).slice(0,4);
    const lineHeight=86;
    const start=canvas.height*.5-(lines.length-1)*lineHeight*.5;
    lines.forEach((line,index)=>ctx.fillText(line.slice(0,28),canvas.width*.5,start+index*lineHeight));
    const texture=new THREE.CanvasTexture(canvas);
    texture.colorSpace=THREE.SRGBColorSpace;
    return texture;
  }
}

class WorldRuntime{
  constructor(app){
    this.app=app;
    this.scene=app.scene;
    this.textureBank=app.textureBank;
    this.root=new THREE.Group();
    this.root.name='WorldRuntime';
    this.scene.add(this.root);
    this.data=createDefaultWorld();
    this.meshes=new Map();
    this.colliders=[];
    this.triggers=[];
    this.spawnPoints=[];
    this.destroyedIds=new Set();
    this.editorMode=false;
  }
  load(world){
    this.data=normalizeWorld(world);
    this.rebuild();
  }
  serialize(){
    return deepClone(this.data);
  }
  saveLocal(){
    this.app.saveProject();
  }
  setEditorMode(active){
    this.editorMode=!!active;
    this.rebuildRuntimeFlags();
  }
  getObject(id){
    return this.data.objects.find(object=>object.id===id)||null;
  }
  addObject(object){
    this.data.objects.push(object);
    this.rebuild();
    this.saveLocal();
  }
  updateObject(id,patch){
    const object=this.getObject(id);
    if(!object) return;
    mergeObject(object,patch);
    this.rebuild();
    this.saveLocal();
  }
  removeObject(id){
    this.data.objects=this.data.objects.filter(object=>object.id!==id);
    this.destroyedIds.delete(id);
    this.rebuild();
    this.saveLocal();
  }
  duplicateObject(id){
    const source=this.getObject(id);
    if(!source) return null;
    const copy=deepClone(source);
    copy.id=uid('wo');
    copy.name=`${source.name} 複本`;
    copy.transform.position.x+=this.data.settings.gridSize||.5;
    copy.transform.position.z+=this.data.settings.gridSize||.5;
    this.addObject(copy);
    return copy;
  }
  clear(){
    this.data.objects=[];
    this.destroyedIds.clear();
    this.rebuild();
    this.saveLocal();
  }
  rebuild(){
    for(const root of this.meshes.values()) this.disposeRoot(root);
    this.root.clear();
    this.meshes.clear();
    this.colliders=[];
    this.triggers=[];
    this.spawnPoints=[];
    for(const object of this.data.objects){
      const root=this.createObjectRoot(object);
      this.root.add(root);
      this.meshes.set(object.id,root);
    }
    this.root.updateMatrixWorld(true);
    this.rebuildRuntimeFlags();
  }
  rebuildRuntimeFlags(){
    this.colliders=[];
    this.triggers=[];
    this.spawnPoints=[];
    for(const object of this.data.objects){
      const root=this.meshes.get(object.id);
      if(!root) continue;
      const destroyed=this.destroyedIds.has(object.id);
      root.visible=this.editorMode||!destroyed;
      root.traverse(child=>{
        if(child.material){
          const mats=Array.isArray(child.material)?child.material:[child.material];
          for(const mat of mats){
            if(object.flags.trigger) mat.opacity=this.editorMode ? .42 : .24;
            mat.transparent=mat.opacity<1;
          }
        }
      });
      if(object.flags.spawn) this.spawnPoints.push({object,root});
      if(object.flags.trigger) this.triggers.push({object,root,inside:false});
      if(object.flags.collidable&&!destroyed){
        let colliderCount=0;
        root.traverse(child=>{
          if(!child.isMesh||child.userData.collider===false) return;
          const box=new THREE.Box3().setFromObject(child);
          this.colliders.push({object,root:child,box});
          colliderCount++;
        });
        if(!colliderCount){
          const box=new THREE.Box3().setFromObject(root);
          this.colliders.push({object,root,box});
        }
      }
    }
  }
  disposeRoot(root){
    root.traverse(child=>{
      if(child.geometry) child.geometry.dispose();
      if(child.material){
        const mats=Array.isArray(child.material)?child.material:[child.material];
        for(const mat of mats) mat.dispose();
      }
    });
  }
  createObjectRoot(object){
    const root=new THREE.Group();
    root.name=object.name||object.type;
    root.userData.worldObjectId=object.id;
    const mesh=this.createMesh(object);
    mesh.userData.worldObjectId=object.id;
    root.add(mesh);
    const p=object.transform.position;
    const r=object.transform.rotation;
    root.position.set(p.x,p.y,p.z);
    root.rotation.set((r.x||0)*DEG,(r.y||0)*DEG,(r.z||0)*DEG);
    return root;
  }
  scaledSize(object){
    return {
      x:Math.max(.02,object.size.x*object.transform.scale.x),
      y:Math.max(.02,object.size.y*object.transform.scale.y),
      z:Math.max(.02,object.size.z*object.transform.scale.z)
    };
  }
  createMesh(object){
    const size=this.scaledSize(object);
    const parts=this.prefabParts(object.type,size);
    if(parts) return this.createPrefabGroup(object,parts);
    let geometry;
    let material;
    if(object.type==='spawn'){
      geometry=new THREE.ConeGeometry(size.x*.48,size.y,4);
      material=this.createMaterial(object);
    }else{
      geometry=new THREE.BoxGeometry(size.x,size.y,size.z);
      material=object.type==='textSign'
        ? new THREE.MeshBasicMaterial({map:this.textureBank.textTexture(object.logic.text||object.name||'文字'),color:'#ffffff'})
        : this.createBoxMaterials(object,size);
    }
    const mesh=new THREE.Mesh(geometry,material);
    mesh.userData.worldObjectId=object.id;
    return mesh;
  }
  createPrefabGroup(object,parts){
    const group=new THREE.Group();
    group.userData.worldObjectId=object.id;
    for(const part of parts){
      let geometry;
      if(part.shape==='cone') geometry=new THREE.ConeGeometry(part.size.x*.5,part.size.y,part.sides||4);
      else geometry=new THREE.BoxGeometry(part.size.x,part.size.y,part.size.z);
      const material=part.shape==='cone'
        ? this.createMaterial(object,null,{color:part.color})
        : this.createBoxMaterials(object,part.size,part.color);
      const mesh=new THREE.Mesh(geometry,material);
      mesh.userData.worldObjectId=object.id;
      mesh.userData.collider=part.collider!==false;
      mesh.position.set(part.position.x,part.position.y,part.position.z);
      if(part.rotation) mesh.rotation.set((part.rotation.x||0)*DEG,(part.rotation.y||0)*DEG,(part.rotation.z||0)*DEG);
      group.add(mesh);
    }
    return group;
  }
  prefabParts(type,size){
    const t=Math.max(.12,Math.min(size.x,size.y,size.z)*.055);
    const h=size.y;
    const x=size.x;
    const z=size.z;
    if(type==='roomPrefab'){
      const doorW=Math.min(x*.36,1.7);
      const sideW=Math.max(.2,(x-doorW)*.5);
      return [
        {size:{x,y:t,z},position:{x:0,y:-h*.5+t*.5,z:0},color:'#65778a'},
        {size:{x,y:h,z:t},position:{x:0,y:0,z:-z*.5+t*.5},color:'#8fa6b8'},
        {size:{x:t,y:h,z},position:{x:-x*.5+t*.5,y:0,z:0},color:'#7f94a7'},
        {size:{x:t,y:h,z},position:{x:x*.5-t*.5,y:0,z:0},color:'#7f94a7'},
        {size:{x:sideW,y:h,z:t},position:{x:-x*.5+sideW*.5,y:0,z:z*.5-t*.5},color:'#8fa6b8'},
        {size:{x:sideW,y:h,z:t},position:{x:x*.5-sideW*.5,y:0,z:z*.5-t*.5},color:'#8fa6b8'}
      ];
    }
    if(type==='housePrefab'){
      const bodyH=h*.68;
      const roofH=h*.2;
      return [
        {size:{x:x*.92,y:bodyH,z:z*.9},position:{x:0,y:-h*.5+bodyH*.5,z:0},color:'#d7b06a'},
        {size:{x:x*1.04,y:roofH,z:z*1.02},position:{x:0,y:-h*.5+bodyH+roofH*.5,z:0},color:'#8a4f3d'},
        {size:{x:x*.22,y:bodyH*.48,z:t*.8},position:{x:0,y:-h*.5+bodyH*.24,z:z*.46},color:'#493225',collider:false},
        {size:{x:x*.12,y:h*.16,z:x*.12},position:{x:x*.28,y:-h*.5+bodyH+roofH+h*.08,z:-z*.16},color:'#5d4035'}
      ];
    }
    if(type==='shopPrefab'){
      const bodyH=h*.76;
      return [
        {size:{x:x*.96,y:bodyH,z:z*.9},position:{x:0,y:-h*.5+bodyH*.5,z:0},color:'#c88f78'},
        {size:{x:x,y:h*.12,z:z*.96},position:{x:0,y:-h*.5+bodyH+h*.06,z:0},color:'#f6c453'},
        {size:{x:x*.9,y:h*.1,z:z*.2},position:{x:0,y:-h*.5+bodyH*.72,z:z*.52},color:'#5eead4',collider:false},
        {size:{x:x*.22,y:bodyH*.52,z:t*.9},position:{x:-x*.26,y:-h*.5+bodyH*.26,z:z*.46},color:'#243244',collider:false},
        {size:{x:x*.22,y:bodyH*.52,z:t*.9},position:{x:x*.26,y:-h*.5+bodyH*.26,z:z*.46},color:'#243244',collider:false}
      ];
    }
    if(type==='towerPrefab'){
      const bodyH=h*.9;
      const floorH=bodyH/5;
      const parts=[
        {size:{x:x*.9,y:bodyH,z:z*.9},position:{x:0,y:-h*.5+bodyH*.5,z:0},color:'#9ca8b5'},
        {size:{x:x,y:h*.08,z:z},position:{x:0,y:-h*.5+bodyH+h*.04,z:0},color:'#586575'}
      ];
      for(let i=1;i<5;i++){
        parts.push({size:{x:x*.96,y:t*.55,z:z*.96},position:{x:0,y:-h*.5+floorH*i,z:0},color:'#c5ced8',collider:false});
      }
      return parts;
    }
    if(type==='stairsPrefab'){
      const steps=6;
      const depth=z/steps;
      const parts=[];
      for(let i=0;i<steps;i++){
        const stepH=h*(i+1)/steps;
        parts.push({
          size:{x,y:stepH,z:depth},
          position:{x:0,y:-h*.5+stepH*.5,z:-z*.5+depth*(i+.5)},
          color:'#b7c0cb'
        });
      }
      return parts;
    }
    if(type==='platformPrefab'){
      const slabH=Math.max(t,h*.18);
      const pillarH=h-slabH;
      const px=x*.08;
      const pz=z*.08;
      const sx=x*.42;
      const sz=z*.32;
      return [
        {size:{x,y:slabH,z},position:{x:0,y:h*.5-slabH*.5,z:0},color:'#7aa56a'},
        {size:{x:px,y:pillarH,z:pz},position:{x:-sx,y:-h*.5+pillarH*.5,z:-sz},color:'#506454'},
        {size:{x:px,y:pillarH,z:pz},position:{x:sx,y:-h*.5+pillarH*.5,z:-sz},color:'#506454'},
        {size:{x:px,y:pillarH,z:pz},position:{x:-sx,y:-h*.5+pillarH*.5,z:sz},color:'#506454'},
        {size:{x:px,y:pillarH,z:pz},position:{x:sx,y:-h*.5+pillarH*.5,z:sz},color:'#506454'}
      ];
    }
    return null;
  }
  createMaterial(object,src=null,{repeat={x:1,y:1},wrap=false,color=null}={}){
    const mat=new THREE.MeshStandardMaterial({
      color:new THREE.Color(color||object.material.color||'#ffffff'),
      roughness:.72,
      metalness:0,
      transparent:(object.material.opacity??1)<1||object.flags.trigger,
      opacity:object.flags.trigger?0.28:(object.material.opacity??1)
    });
    const texture=this.textureBank.texture(src,{repeat,wrap});
    if(texture){
      mat.map=texture;
      mat.color.set('#ffffff');
    }
    return mat;
  }
  createBoxMaterials(object,size,color=null){
    const skin=object.material.skin||{};
    if(skin.mode==='perFace'){
      return FACE_KEYS.map(face=>this.createMaterial(object,skin.faces?.[face]||null,{repeat:skin.repeat||{x:1,y:1},wrap:false,color}));
    }
    if(skin.mode==='single'){
      return FACE_KEYS.map(face=>this.createMaterial(object,face===(skin.singleFace||'pz')?skin.src:null,{repeat:skin.repeat||{x:1,y:1},wrap:false,color}));
    }
    if(skin.mode==='stretch'){
      return this.createMaterial(object,skin.src,{repeat:{x:1,y:1},wrap:false,color});
    }
    if(skin.mode==='repeat'){
      const repeat=skin.repeat||{x:Math.max(1,size.x),y:Math.max(1,size.y)};
      return this.createMaterial(object,skin.src,{repeat,wrap:true,color});
    }
    return this.createMaterial(object,null,{color});
  }
  pick(raycaster){
    const roots=[...this.meshes.values()].filter(Boolean);
    const hits=raycaster.intersectObjects(roots,true);
    if(!hits.length) return null;
    let node=hits[0].object;
    while(node&&!node.userData.worldObjectId&&node.parent) node=node.parent;
    const id=node?.userData.worldObjectId;
    return id?{id,object:this.getObject(id),root:this.meshes.get(id),hit:hits[0]}:null;
  }
  getSpawnPosition(){
    const spawn=this.spawnPoints[0];
    if(spawn) return spawn.root.position.clone();
    return new THREE.Vector3(0,.8,4);
  }
  playerBoxAt(position){
    const radius=this.app.player.radius;
    const height=this.app.player.height;
    return new THREE.Box3(
      new THREE.Vector3(position.x-radius,position.y-height*.5,position.z-radius),
      new THREE.Vector3(position.x+radius,position.y+height*.5,position.z+radius)
    );
  }
  collidesAt(position){
    const playerBox=this.playerBoxAt(position);
    return this.colliders.some(item=>playerBox.intersectsBox(item.box));
  }
  updateTriggers(position){
    const playerBox=this.playerBoxAt(position);
    for(const trigger of this.triggers){
      const box=new THREE.Box3().setFromObject(trigger.root);
      const inside=playerBox.intersectsBox(box);
      if(inside&&!trigger.inside) this.app.showMessage(trigger.object.logic.message||trigger.object.name||'觸發區');
      trigger.inside=inside;
    }
  }
  interact(position){
    let best=null;
    let bestDist=Infinity;
    for(const object of this.data.objects){
      if(this.destroyedIds.has(object.id)) continue;
      if(!object.flags.interactive&&!object.flags.destructible) continue;
      const root=this.meshes.get(object.id);
      if(!root) continue;
      const dist=root.position.distanceTo(position);
      if(dist<1.9&&dist<bestDist){best={object,root};bestDist=dist;}
    }
    if(!best){
      this.app.showMessage('附近沒有可互動目標');
      return;
    }
    const {object}=best;
    if(object.flags.destructible){
      object.logic.health=Math.max(0,(object.logic.health||1)-1);
      if(object.logic.health<=0){
        this.destroyedIds.add(object.id);
        this.app.game.score+=10;
        this.rebuildRuntimeFlags();
        this.app.showMessage(object.logic.message||`${object.name} 已破壞`);
      }else{
        this.app.showMessage(`${object.name}: ${object.logic.health}`);
      }
      return;
    }
    this.app.showMessage(object.logic.message||object.logic.text||object.name);
  }
}

class ActorRuntime{
  constructor(app){
    this.app=app;
    this.scene=app.scene;
    this.loader=new GLTFLoader();
    this.data=createDefaultActors();
    this.root=new THREE.Group();
    this.root.name='ActorRuntimeNPCs';
    this.scene.add(this.root);
    this.npcMeshes=new Map();
    this.gltfCache=new Map();
    this.spriteStates=new Map();
    this.playerAction='idle';
  }
  load(actors){
    this.data=normalizeActors(actors);
    this.rebuildPlayer();
    this.rebuildNPCs();
  }
  serialize(){
    return deepClone(this.data);
  }
  saveLocal(){
    this.app.saveProject();
  }
  getRole(role){
    return this.data.roles?.[role]||this.data.roles.player;
  }
  updateRole(role,patch){
    this.data.roles[role]=makeActorRole(role,mergeObject(this.getRole(role),patch));
    this.rebuildPlayer();
    this.rebuildNPCs();
    this.saveLocal();
  }
  rebuildPlayer(){
    this.buildVisualInto(this.app.player.mesh,this.getRole('player'),'player');
  }
  rebuildNPCs(){
    this.root.clear();
    this.npcMeshes.clear();
    for(const key of Array.from(this.spriteStates.keys())){
      if(key!=='player') this.spriteStates.delete(key);
    }
    for(const npc of this.data.npcs){
      if(npc.enabled===false) continue;
      const group=new THREE.Group();
      group.name=npc.name||'NPC';
      group.userData.npcId=npc.id;
      group.position.set(npc.position.x,npc.position.y,npc.position.z);
      group.rotation.set((npc.rotation.x||0)*DEG,(npc.rotation.y||0)*DEG,(npc.rotation.z||0)*DEG);
      this.buildVisualInto(group,this.getRole(npc.actorId||'npc'),npc.id);
      this.root.add(group);
      this.npcMeshes.set(npc.id,group);
    }
  }
  buildVisualInto(group,role,stateKey){
    group.clear();
    this.spriteStates.delete(stateKey);
    const model=role.model||{};
    const scale=toNumber(model.scale,1);
    if(model.type==='spriteSequence' && model.sequence?.length){
      const sprite=new THREE.Sprite(new THREE.SpriteMaterial({map:this.textureFromSource(model.sequence[0]),transparent:true}));
      sprite.scale.set(1.1*scale,1.55*scale,1);
      sprite.position.y=.45*scale;
      group.add(sprite);
      this.spriteStates.set(stateKey,{sprite,role,frame:0,timer:0,action:'idle'});
      return;
    }
    if(model.type==='gltf' && model.src){
      const holder=new THREE.Group();
      holder.scale.setScalar(scale);
      group.add(holder);
      this.loadGLTFInto(holder,model.src);
      return;
    }
    const geo=role.role==='player'
      ? new THREE.CapsuleGeometry(this.app.player.radius,this.app.player.height-this.app.player.radius*2,8,16)
      : new THREE.CapsuleGeometry(.32,1.0,8,12);
    const mat=new THREE.MeshStandardMaterial({color:role.role==='player'?'#5eead4':'#f6c453',roughness:.45});
    const mesh=new THREE.Mesh(geo,mat);
    mesh.scale.setScalar(scale);
    group.add(mesh);
  }
  textureFromSource(src){
    return this.app.textureBank.texture(src,{repeat:{x:1,y:1},wrap:false});
  }
  loadGLTFInto(holder,src){
    if(this.gltfCache.has(src)){
      holder.add(this.gltfCache.get(src).clone(true));
      return;
    }
    this.loader.load(src,gltf=>{
      const scene=gltf.scene||gltf.scenes?.[0];
      if(!scene) return;
      this.gltfCache.set(src,scene);
      holder.clear();
      holder.add(scene.clone(true));
    },undefined,err=>console.warn('3D 模型載入失敗',err));
  }
  setRoleModel(roleId,model){
    const role=this.getRole(roleId);
    role.model={...role.model,...model};
    this.rebuildPlayer();
    this.rebuildNPCs();
    this.saveLocal();
  }
  update(dt){
    const moving=this.app.input.movementVector();
    this.playerAction=(Math.abs(moving.forward)+Math.abs(moving.strafe))>0?'move':'idle';
    for(const [key,state] of this.spriteStates.entries()){
      const model=state.role.model||{};
      const sequence=model.sequence||[];
      if(sequence.length<2) continue;
      const action=key==='player'?this.playerAction:'idle';
      const actionDef=(state.role.actions||[]).find(a=>a.id===action)||state.role.actions?.[0]||{frames:{from:0,to:sequence.length-1},fps:model.frameRate||8};
      const from=clamp(toNumber(actionDef.frames?.from,0),0,sequence.length-1);
      const to=clamp(toNumber(actionDef.frames?.to,sequence.length-1),from,sequence.length-1);
      const fps=Math.max(1,toNumber(actionDef.fps,model.frameRate||8));
      state.timer+=dt;
      if(state.timer>=1/fps){
        state.timer=0;
        state.frame=state.frame<from||state.frame>=to?from:state.frame+1;
        state.sprite.material.map=this.textureFromSource(sequence[state.frame]);
        state.sprite.material.needsUpdate=true;
      }
      if(model.billboard!==false) state.sprite.lookAt(this.app.camera.position);
    }
  }
  interact(position){
    let best=null;
    let bestDist=Infinity;
    for(const npc of this.data.npcs){
      if(npc.enabled===false) continue;
      const mesh=this.npcMeshes.get(npc.id);
      if(!mesh) continue;
      const dist=mesh.position.distanceTo(position);
      if(dist<Math.max(1.4,npc.radius+0.9)&&dist<bestDist){best={npc,mesh};bestDist=dist;}
    }
    if(!best) return false;
    const role=this.getRole(best.npc.actorId||'npc');
    const interaction=role.interaction||{};
    if(interaction.onInteract==='score') this.app.game.score+=Math.max(1,toNumber(interaction.affinity,1));
    if(interaction.onInteract==='damage') this.app.game.health=clamp(this.app.game.health-Math.max(1,Math.abs(toNumber(interaction.affinity,5))),0,100);
    this.app.showMessage(interaction.message||best.npc.name||'NPC');
    return true;
  }
  addNPCNearPlayer(){
    const forward=this.app.getCameraForward();
    const pos=this.app.player.position.clone().addScaledVector(forward,2.5);
    const npc={id:uid('npc'),actorId:'npc',name:'NPC',position:{x:pos.x,y:.75,z:pos.z},rotation:{x:0,y:0,z:0},radius:.75,enabled:true};
    this.data.npcs.push(npc);
    this.rebuildNPCs();
    this.saveLocal();
    return npc;
  }
  removeNPC(id){
    this.data.npcs=this.data.npcs.filter(npc=>npc.id!==id);
    this.rebuildNPCs();
    this.saveLocal();
  }
}

class UILayer{
  constructor(app){
    this.app=app;
    this.stage=$('#ui-stage');
    this.data=createDefaultUI();
    this.previewScreen=null;
  }
  load(ui){
    this.data=normalizeUI(ui);
    this.render();
  }
  serialize(){
    return deepClone(this.data);
  }
  currentScreen(){
    return this.previewScreen||this.app.game.screen||'game';
  }
  saveLocal(){
    this.app.saveProject();
  }
  getElement(id){
    return this.data.elements.find(element=>element.id===id)||null;
  }
  addElement(element){
    this.data.elements.push(element);
    this.render();
    this.saveLocal();
  }
  removeElement(id){
    this.data.elements=this.data.elements.filter(element=>element.id!==id);
    this.render();
    this.saveLocal();
  }
  duplicateElement(id){
    const source=this.getElement(id);
    if(!source) return null;
    const copy=deepClone(source);
    copy.id=uid('ui');
    copy.name=`${source.name} 複本`;
    copy.x=clamp(copy.x+2,0,96);
    copy.y=clamp(copy.y+2,0,96);
    this.addElement(copy);
    return copy;
  }
  render(){
    this.stage.innerHTML='';
    const screen=this.currentScreen();
    for(const element of this.data.elements){
      if(element.screen!==screen||element.visible===false) continue;
      const node=this.createElementNode(element);
      this.stage.appendChild(node);
    }
    this.updateBindings();
  }
  createElementNode(element){
    const node=document.createElement('div');
    node.className=`game-ui-element is-${element.type.replace(/[A-Z]/g,m=>'-'+m.toLowerCase())}`;
    node.dataset.uiId=element.id;
    node.dataset.uiBind=element.bind||'none';
    Object.assign(node.style,{
      left:`${element.x}%`,
      top:`${element.y}%`,
      width:`${element.w}%`,
      height:`${element.h}%`,
      zIndex:String(element.z),
      opacity:String(element.opacity),
      color:element.color,
      background:element.image?`${element.bgColor} url("${element.image}") center / cover no-repeat`:element.bgColor,
      border:`1px solid ${element.borderColor}`,
      borderRadius:`${element.radius}px`,
      fontSize:`${element.fontSize}px`
    });
    if(element.type==='button'||element.type==='controlButton'){
      const button=document.createElement('button');
      button.className='game-ui-button';
      button.textContent=element.text||element.name;
      button.style.color=element.color;
      button.style.background='transparent';
      button.style.border='none';
      button.style.fontSize='inherit';
      if(element.bind==='restart') button.addEventListener('click',()=>this.app.restartGame());
      if(element.bind==='action') button.addEventListener('click',()=>this.app.interact());
      node.appendChild(button);
    }else if(element.type==='statusBar'){
      node.innerHTML=`<div class="game-ui-status"><div class="game-ui-status-label">${escapeHTML(element.text||element.name)}</div><div class="game-ui-bar"><div class="game-ui-fill"></div></div></div>`;
    }else if(element.type==='score'){
      node.textContent=element.text||'分數';
    }else{
      node.textContent=element.text||'';
    }
    return node;
  }
  updateBindings(){
    for(const node of $$('[data-ui-bind]',this.stage)){
      const bind=node.dataset.uiBind;
      if(bind==='score') node.textContent=`分數 ${this.app.game.score}`;
      if(bind==='message') node.textContent=this.app.game.message||'';
      if(bind==='health'){
        const fill=$('.game-ui-fill',node);
        if(fill) fill.style.width=`${clamp(this.app.game.health,0,100)}%`;
      }
    }
  }
}

class InputController{
  constructor(app){
    this.app=app;
    this.keys=new Set();
    this.pointer={dragging:false,lastX:0,lastY:0};
    window.addEventListener('keydown',event=>this.onKeyDown(event));
    window.addEventListener('keyup',event=>this.onKeyUp(event));
    app.canvas.addEventListener('pointerdown',event=>this.onPointerDown(event));
    window.addEventListener('pointermove',event=>this.onPointerMove(event));
    window.addEventListener('pointerup',()=>this.pointer.dragging=false);
    window.addEventListener('wheel',event=>this.onWheel(event),{passive:false});
  }
  clear(){
    this.keys.clear();
    this.pointer.dragging=false;
  }
  onKeyDown(event){
    if(event.shiftKey&&event.code==='KeyC'){
      event.preventDefault();
      this.clear();
      this.app.creator.toggle();
      return;
    }
    if(this.app.creator.active){
      if(this.app.creator.handleKeyDown(event)) return;
      if(!this.app.creator.canUpdatePlayer()) return;
    }
    if(isEditable(document.activeElement)) return;
    if(event.code==='KeyF'){
      event.preventDefault();
      this.app.toggleFullscreen();
      return;
    }
    if(event.code==='KeyE'){
      event.preventDefault();
      this.app.interact();
      return;
    }
    this.keys.add(event.code);
  }
  onKeyUp(event){
    this.keys.delete(event.code);
  }
  onPointerDown(event){
    if(this.app.creator.active&&!this.app.creator.canUpdatePlayer()) return;
    if(event.button!==0) return;
    this.pointer.dragging=true;
    this.pointer.lastX=event.clientX;
    this.pointer.lastY=event.clientY;
  }
  onPointerMove(event){
    if(!this.pointer.dragging) return;
    if(this.app.creator.active&&!this.app.creator.canUpdatePlayer()) return;
    const dx=event.clientX-this.pointer.lastX;
    const dy=event.clientY-this.pointer.lastY;
    this.pointer.lastX=event.clientX;
    this.pointer.lastY=event.clientY;
    this.app.cameraYaw-=dx*.006;
    this.app.cameraPitch=clamp(this.app.cameraPitch+dy*.004,-.7,.9);
  }
  onWheel(event){
    if(!this.app.creator.active) return;
    if(event.target.closest?.('.creator-panel,.world-toolkit,.creator-toolbar,.modal-backdrop')) return;
    event.preventDefault();
    this.app.zoomCamera(event.deltaY);
  }
  movementVector(){
    const forward=(this.keys.has('KeyW')||this.keys.has('ArrowUp')?1:0)-(this.keys.has('KeyS')||this.keys.has('ArrowDown')?1:0);
    const strafe=(this.keys.has('KeyD')||this.keys.has('ArrowRight')?1:0)-(this.keys.has('KeyA')||this.keys.has('ArrowLeft')?1:0);
    return {forward,strafe};
  }
}

class GameApp{
  constructor(){
    this.canvas=$('#game-canvas');
    this.renderer=new THREE.WebGLRenderer({canvas:this.canvas,antialias:true,powerPreference:'high-performance'});
    this.renderer.outputColorSpace=THREE.SRGBColorSpace;
    this.renderer.setClearColor('#071018');
    this.scene=new THREE.Scene();
    this.scene.background=new THREE.Color('#071018');
    this.scene.fog=new THREE.Fog('#071018',26,78);
    this.camera=new THREE.PerspectiveCamera(62,1,.05,160);
    this.cameraYaw=0;
    this.cameraPitch=.34;
    this.cameraDistance=7;
    this.textureBank=new TextureBank();
    this.clock=new THREE.Clock();
    this.game={score:0,health:100,message:'',messageTimer:0,screen:'game',time:0};
    this.player={radius:.35,height:1.55,speed:4.2,mesh:null,position:new THREE.Vector3()};
    this.setupScene();
    this.world=new WorldRuntime(this);
    this.actors=new ActorRuntime(this);
    this.ui=new UILayer(this);
    this.creator=new CreatorBackend(this);
    this.input=new InputController(this);
    this.loadProject();
    this.resize();
    window.addEventListener('resize',()=>this.resize());
    window.render_game_to_text=()=>this.renderGameToText();
    window.advanceTime=ms=>this.advanceTime(ms);
    window.gameTemplate=this;
  }
  setupScene(){
    const hemi=new THREE.HemisphereLight('#b8d8ff','#1a2430',1.2);
    this.scene.add(hemi);
    const sun=new THREE.DirectionalLight('#ffffff',1.8);
    sun.position.set(8,12,6);
    this.scene.add(sun);
    this.player.mesh=new THREE.Group();
    this.player.mesh.name='TemplatePlayer';
    this.scene.add(this.player.mesh);
  }
  loadProject(){
    let project=null;
    try{project=JSON.parse(localStorage.getItem(STORAGE_KEY)||'null');}catch(_){}
    const normalized=normalizeProject(project);
    this.world.load(normalized.world);
    this.actors.load(normalized.actors);
    this.ui.load(normalized.ui);
    this.restartGame(false);
  }
  saveProject(){
    const project={schema:'template.project',version:1,world:this.world.serialize(),ui:this.ui.serialize(),actors:this.actors.serialize()};
    try{localStorage.setItem(STORAGE_KEY,JSON.stringify(project));}catch(err){console.warn('儲存失敗',err);}
  }
  exportProject(){
    return {schema:'template.project',version:1,world:this.world.serialize(),ui:this.ui.serialize(),actors:this.actors.serialize()};
  }
  importProject(project){
    const normalized=normalizeProject(project);
    this.world.load(normalized.world);
    this.actors.load(normalized.actors);
    this.ui.load(normalized.ui);
    this.restartGame(false);
    this.saveProject();
    this.creator.refresh();
  }
  restartGame(show=true){
    this.game.score=0;
    this.game.health=100;
    this.game.message='';
    this.game.messageTimer=0;
    this.world.destroyedIds.clear();
    this.world.rebuildRuntimeFlags();
    const spawnPos=this.world.getSpawnPosition();
    this.player.position.set(spawnPos.x,Math.max(.8,spawnPos.y),spawnPos.z);
    this.player.mesh.position.copy(this.player.position);
    if(show) this.showMessage('重新開始');
  }
  start(){
    this.clock.start();
    const loop=()=>{
      const dt=Math.min(.05,this.clock.getDelta());
      this.update(dt);
      this.render();
      requestAnimationFrame(loop);
    };
    loop();
  }
  advanceTime(ms){
    const steps=Math.max(1,Math.round(ms/(1000/60)));
    for(let i=0;i<steps;i++) this.update(1/60);
    this.render();
  }
  update(dt){
    this.game.time+=dt;
    if(this.game.messageTimer>0){
      this.game.messageTimer-=dt;
      if(this.game.messageTimer<=0) this.game.message='';
    }
    if(!this.creator.active || this.creator.canUpdatePlayer()) this.updatePlayer(dt);
    this.world.updateTriggers(this.player.position);
    this.actors.update(dt);
    this.updateCamera();
    this.ui.updateBindings();
  }
  updatePlayer(dt){
    const move=this.input.movementVector();
    const direction=new THREE.Vector3();
    const forward=this.getCameraForward();
    const right=this.getCameraRight(forward);
    direction.addScaledVector(forward,move.forward);
    direction.addScaledVector(right,move.strafe);
    if(direction.lengthSq()>0){
      direction.normalize().multiplyScalar(this.player.speed*dt);
      const nextX=this.player.position.clone();
      nextX.x+=direction.x;
      if(!this.world.collidesAt(nextX)) this.player.position.x=nextX.x;
      const nextZ=this.player.position.clone();
      nextZ.z+=direction.z;
      if(!this.world.collidesAt(nextZ)) this.player.position.z=nextZ.z;
    }
    this.player.mesh.position.copy(this.player.position);
  }
  updateCamera(){
    const distance=this.cameraDistance;
    const target=this.player.position.clone().add(new THREE.Vector3(0,.55,0));
    const horizontal=Math.cos(this.cameraPitch)*distance;
    const height=2.2+Math.sin(this.cameraPitch)*distance;
    const offset=new THREE.Vector3(
      Math.sin(this.cameraYaw)*horizontal,
      height,
      Math.cos(this.cameraYaw)*horizontal
    );
    this.camera.position.copy(target).add(offset);
    this.camera.lookAt(target);
  }
  getCameraForward(){
    return new THREE.Vector3(-Math.sin(this.cameraYaw),0,-Math.cos(this.cameraYaw));
  }
  getCameraRight(forward=this.getCameraForward()){
    return new THREE.Vector3(-forward.z,0,forward.x);
  }
  zoomCamera(deltaY){
    const factor=deltaY>0?1.12:.88;
    this.cameraDistance=clamp(this.cameraDistance*factor,2.6,24);
    this.updateCamera();
  }
  render(){
    this.renderer.render(this.scene,this.camera);
  }
  resize(){
    const w=window.innerWidth;
    const h=window.innerHeight;
    this.renderer.setPixelRatio(Math.min(2,window.devicePixelRatio||1));
    this.renderer.setSize(w,h,false);
    this.camera.aspect=w/Math.max(1,h);
    this.camera.updateProjectionMatrix();
    this.creator?.uiEditor?.refreshBoxes();
  }
  interact(){
    if(this.creator.active) return;
    if(this.actors.interact(this.player.position)) return;
    this.world.interact(this.player.position);
  }
  showMessage(message){
    this.game.message=String(message||'');
    this.game.messageTimer=2.2;
    const toast=$('#game-toast');
    toast.textContent=this.game.message;
    toast.classList.add('show');
    clearTimeout(this.toastTimer);
    this.toastTimer=setTimeout(()=>toast.classList.remove('show'),1300);
  }
  toggleFullscreen(){
    if(!document.fullscreenElement) document.documentElement.requestFullscreen?.();
    else document.exitFullscreen?.();
  }
  renderGameToText(){
    const nearby=this.world.data.objects
      .filter(object=>!this.world.destroyedIds.has(object.id))
      .map(object=>({id:object.id,type:object.type,name:object.name,x:+object.transform.position.x.toFixed(2),y:+object.transform.position.y.toFixed(2),z:+object.transform.position.z.toFixed(2),collidable:!!object.flags.collidable,trigger:!!object.flags.trigger,interactive:!!object.flags.interactive,destructible:!!object.flags.destructible}))
      .slice(0,60);
    return JSON.stringify({
      note:'座標使用 Three.js 世界空間：X 向右、Y 向上、Z 為前後方向。',
      mode:this.creator.active?`creator:${this.creator.mode}`:'game',
      player:{x:+this.player.position.x.toFixed(2),y:+this.player.position.y.toFixed(2),z:+this.player.position.z.toFixed(2)},
      camera:{distance:+this.cameraDistance.toFixed(2),pitch:+this.cameraPitch.toFixed(2),yaw:+this.cameraYaw.toFixed(2)},
      score:this.game.score,
      health:this.game.health,
      message:this.game.message,
      creator:this.creator.active?this.creator.getDebugState():null,
      actors:{npcCount:this.actors.data.npcs.length,playerModel:this.actors.getRole('player')?.model?.type||'primitive',npcModel:this.actors.getRole('npc')?.model?.type||'primitive'},
      objects:nearby
    });
  }
}

class CreatorBackend{

        <button type="button" data-mode="actor">角色/NPC</button>

        <button type="button" data-action="import-project">匯入專案</button>

      </div>
      <section class="creator-panel left" data-world-left></section>
      <section class="creator-panel right" data-world-right></section>
      <section class="creator-panel left" data-actor-left hidden></section>
      <section class="creator-panel right" data-actor-right hidden></section>
      <section class="creator-panel left" data-ui-left hidden></section>
      <section class="creator-panel right" data-ui-right hidden></section>
      <div class="ui-editor-layer" data-ui-editor-layer hidden></div>
      <div class="status-line" data-creator-status></div>`;
    document.body.appendChild(root);
    root.addEventListener('pointerdown',event=>{
      if(event.target.closest('.creator-panel,.creator-toolbar,.modal-backdrop')) event.stopPropagation();
    });
    return root;
  }
  bindToolbar(){
    this.root.addEventListener('click',event=>{
      const modeButton=event.target.closest('[data-mode]');
      if(modeButton){this.setMode(modeButton.dataset.mode);return;}
      const action=event.target.closest('[data-action]')?.dataset.action;
      if(!action) return;
      if(action==='close') this.disable();
      if(action==='save'){this.app.saveProject();this.setStatus('專案已儲存');}
      if(action==='export-project') this.openJsonModal({title:'匯出專案 JSON',value:JSON.stringify(this.app.exportProject(),null,2)});
      if(action==='import-project') this.openJsonModal({title:'匯入專案 JSON',value:'',applyLabel:'匯入',onApply:text=>this.app.importProject(JSON.parse(text))});
      if(action==='reset-project') this.resetProject();
    });
  }
  toggle(){
    this.active?this.disable():this.enable();
  }
  enable(){
    this.active=true;
    document.body.classList.add('creator-active');
    this.root.hidden=false;
    this.app.world.setEditorMode(true);
    this.setMode(this.mode||'world');
    this.refresh();
  }
  disable(){
    this.active=false;
    this.worldBuilder.disable();
    this.actorEditor.disable();
    this.uiEditor.disable();
    this.root.hidden=true;
    document.body.classList.remove('creator-active','creator-world','creator-actor','creator-ui');
    this.app.world.setEditorMode(false);
    this.app.saveProject();
    this.app.input.clear();
  }
  setMode(mode){
    this.mode=['world','actor','ui'].includes(mode)?mode:'world';
    document.body.classList.toggle('creator-world',this.mode==='world');
    document.body.classList.toggle('creator-actor',this.mode==='actor');
    document.body.classList.toggle('creator-ui',this.mode==='ui');
    $$('[data-mode]',this.root).forEach(button=>button.classList.toggle('is-active',button.dataset.mode===this.mode));
    $('[data-world-left]',this.root).hidden=this.mode!=='world';
    $('[data-world-right]',this.root).hidden=this.mode!=='world';
    $('[data-actor-left]',this.root).hidden=this.mode!=='actor';
    $('[data-actor-right]',this.root).hidden=this.mode!=='actor';
    $('[data-ui-left]',this.root).hidden=this.mode!=='ui';
    $('[data-ui-right]',this.root).hidden=this.mode!=='ui';
    if(this.mode==='world'){
      this.actorEditor.disable();
      this.uiEditor.disable();
      this.worldBuilder.enable();
      this.setStatus('空間編輯模式');
    }else if(this.mode==='actor'){
      this.worldBuilder.disable();
      this.uiEditor.disable();
      this.actorEditor.enable();
      this.setStatus('角色與 NPC 編輯模式');
    }else{
      this.worldBuilder.disable();
      this.actorEditor.disable();
      this.uiEditor.enable();
      this.setStatus('介面編輯模式');
    }
    this.refresh();
  }
  refresh(){
    this.worldBuilder.refresh();
    this.actorEditor.refresh();
    this.uiEditor.refresh();
  }
  handleKeyDown(event){
    if(event.code==='Escape'){
      event.preventDefault();
      this.disable();
      return true;
    }
    if(this.mode==='world') return this.worldBuilder.handleKeyDown(event);
    if(this.mode==='actor') return this.actorEditor.handleKeyDown(event);
    return this.uiEditor.handleKeyDown(event);
  }
  canUpdatePlayer(){
    return this.active&&this.mode==='world'&&this.worldBuilder.canControlPlayer();
  }
  getDebugState(){
    return {
      mode:this.mode,
      world:this.mode==='world'?this.worldBuilder.debugState():null,
      actor:this.mode==='actor'?this.actorEditor.debugState():null
    };
  }
  setStatus(text){
    if(this.status) this.status.textContent=text||'';
  }
  resetProject(){
    if(!confirm('要重設世界與介面模板資料嗎？')) return;
    this.app.importProject({version:1,world:createDefaultWorld(),ui:createDefaultUI(),actors:createDefaultActors()});
    this.setStatus('模板已重設');
  }
  openJsonModal({title,value='',applyLabel='複製',onApply=null}){
    const backdrop=document.createElement('div');
    backdrop.className='modal-backdrop';
    backdrop.innerHTML=`
      <div class="modal">
        <h2>${escapeHTML(title)}</h2>
        <textarea spellcheck="false"></textarea>
        <div class="modal-actions">
          <button type="button" data-modal="download">下載</button>
          <button type="button" data-modal="apply" class="primary">${escapeHTML(applyLabel)}</button>
          <button type="button" data-modal="close">關閉</button>
        </div>
      </div>`;
    const textarea=$('textarea',backdrop);
    textarea.value=value;
    backdrop.addEventListener('click',event=>{
      const action=event.target.dataset.modal;
      if(!action) return;
      if(action==='close') backdrop.remove();
      if(action==='download') downloadText('game-template-export.json',textarea.value,'application/json;charset=utf-8');
      if(action==='apply'){
        try{
          if(onApply){onApply(textarea.value);backdrop.remove();}
          else{
            textarea.select();
            navigator.clipboard?.writeText(textarea.value).catch(()=>document.execCommand?.('copy'));
            this.setStatus('JSON 已複製');
          }
        }catch(err){alert(`JSON 格式錯誤：${err.message}`);}
      }
    });
    this.root.appendChild(backdrop);
    textarea.focus();
  }
}

function downloadText(filename,text,type='text/plain;charset=utf-8'){
  const blob=new Blob([text],{type});
  const url=URL.createObjectURL(blob);
  const anchor=document.createElement('a');
  anchor.href=url;
  anchor.download=filename;
  document.body.appendChild(anchor);
  anchor.click();
  anchor.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

  renderNPCPanel(npc){

      return `

          <p class="muted">請新增或選取一個 NPC 實例。</p>

    }
    return `

        <label>名稱<input data-actor-npc-field="name" value="${escapeHTML(npc.name)}"></label>
        <div class="creator-grid three">
          ${axisActorInputs('position',npc.position,'位置')}
        </div>
        <div class="creator-grid three">
          ${axisActorInputs('rotation',npc.rotation,'旋轉')}
        </div>
        <div class="creator-grid two">
          <label>互動半徑<input data-actor-npc-field="radius" type="number" min="0.1" step="0.05" value="${npc.radius??0.75}"></label>
          <label class="inline-check"><input data-actor-npc-field="enabled" type="checkbox" ${npc.enabled!==false?'checked':''}> 啟用</label>
        </div>
      </div>`;
  }
  handleClick(event){
    const role=event.target.closest('[data-actor-role]')?.dataset.actorRole;
    if(role){
      this.role=role;
      this.app.actors.data.selectedRole=role;
      this.app.actors.saveLocal();
      this.refresh();
      return;
    }
    const npcId=event.target.closest('[data-actor-npc]')?.dataset.actorNpc;
    if(npcId){
      this.selectedNPC=npcId;
      this.role='npc';
      this.app.actors.data.selectedRole='npc';
      this.refresh();
      return;
    }
    const action=event.target.closest('[data-actor-action]')?.dataset.actorAction;
    if(!action) return;
    if(action==='import-png') this.requestImport('png');
    if(action==='import-gltf') this.requestImport('gltf');
    if(action==='reset-model') this.setRoleModel({type:'primitive',src:'',fileName:'',sequence:[]});
    if(action==='save'){this.commitActors();this.creator.setStatus('角色資料已儲存');}
    if(action==='add-npc'){
      const npc=this.app.actors.addNPCNearPlayer();
      this.selectedNPC=npc.id;
      this.role='npc';
      this.app.actors.data.selectedRole='npc';
      this.refresh();
    }
    if(action==='remove-npc'&&this.selectedNPC){
      this.app.actors.removeNPC(this.selectedNPC);
      this.selectedNPC=this.app.actors.data.npcs[0]?.id||null;
      this.refresh();
    }
    if(action==='export-actors') this.creator.openJsonModal({title:'匯出角色 JSON',value:JSON.stringify(this.app.actors.serialize(),null,2)});
    if(action==='import-actors') this.creator.openJsonModal({title:'匯入角色 JSON',value:'',applyLabel:'匯入',onApply:text=>{
      this.app.actors.load(JSON.parse(text));
      this.app.actors.saveLocal();
      this.role=this.app.actors.data.selectedRole||'player';
      this.selectedNPC=this.app.actors.data.npcs[0]?.id||null;
      this.refresh();
    }});
  }
  handleInput(event){
    const role=this.roleData();
    const roleField=event.target.dataset.actorRoleField;
    const modelField=event.target.dataset.actorModelField;
    const interactionField=event.target.dataset.actorInteractionField;
    const actionId=event.target.dataset.actorActionId;
    const actionField=event.target.dataset.actorActionField;
    const npcField=event.target.dataset.actorNpcField;
    if(roleField){
      role[roleField]=this.inputValue(event.target,role[roleField]);
      this.commitActors(false);
      this.refresh();
      return;
    }
    if(modelField){
      role.model=role.model||{};
      role.model[modelField]=this.inputValue(event.target,role.model[modelField]);
      this.commitActors(false);
      this.refresh();
      return;
    }
    if(interactionField){
      role.interaction=role.interaction||{};
      role.interaction[interactionField]=this.inputValue(event.target,role.interaction[interactionField]);
      this.commitActors(false);
      this.refresh();
      return;
    }
    if(actionId&&actionField){
      const action=role.actions.find(item=>item.id===actionId);
      if(action){
        if(actionField==='from'||actionField==='to'){
          action.frames=action.frames||{from:0,to:0};
          action.frames[actionField]=Math.max(0,Math.round(toNumber(event.target.value,0)));
        }else{
          action[actionField]=this.inputValue(event.target,action[actionField]);
        }
        this.commitActors(false);
        this.refresh();
      }
      return;
    }
    if(npcField){
      const npc=this.selectedNPCData();
      if(!npc) return;
      setPath(npc,npcField,this.inputValue(event.target,getPath(npc,npcField)));
      this.app.actors.rebuildNPCs();
      this.app.actors.saveLocal();
      this.refresh();
    }
  }
  inputValue(input,fallback){
    if(input.type==='checkbox') return input.checked;
    if(input.type==='number') return toNumber(input.value,fallback);
    return input.value;
  }
  commitActors(refresh=true){
    this.app.actors.data.selectedRole=this.role;
    this.app.actors.rebuildPlayer();
    this.app.actors.rebuildNPCs();
    this.app.actors.saveLocal();
    if(refresh) this.refresh();
  }
  requestImport(kind){
    this.pendingImport={kind,role:this.role};
    this.fileInput.multiple=kind==='png';
    this.fileInput.accept=kind==='png'?'image/png,.png':'.glb,.gltf,model/gltf+json,model/gltf-binary';
    this.fileInput.click();
  }
  async handleActorFile(event){
    const files=Array.from(event.target.files||[]);
    event.target.value='';
    const pending=this.pendingImport;
    this.pendingImport=null;
    if(!pending||!files.length) return;
    const previousRole=this.role;
    this.role=pending.role;
    if(pending.kind==='png'){
      const pngs=files.filter(file=>/\.png$/i.test(file.name)||file.type==='image/png').sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true}));
      const sequence=await Promise.all(pngs.map(file=>this.readFile(file)));
      if(sequence.length){
        this.setRoleModel({type:'spriteSequence',src:sequence[0],sequence,fileName:`${sequence.length} 張 PNG`,billboard:true});
      }
    }else{
      const file=files[0];
      const src=await this.readFile(file);
      this.setRoleModel({type:'gltf',src,fileName:file.name,sequence:[]});
    }
    this.role=previousRole;
    this.refresh();
  }
  readFile(file){
    return new Promise((resolve,reject)=>{
      const reader=new FileReader();
      reader.onload=()=>resolve(String(reader.result||''));
      reader.onerror=()=>reject(reader.error);
      reader.readAsDataURL(file);
    });
  }
  setRoleModel(model){
    const role=this.roleData();
    role.model={...role.model,...model};
    this.commitActors();
  }
  handleKeyDown(event){
    if(isEditable(document.activeElement)) return false;
    if((event.ctrlKey||event.metaKey)&&event.code==='KeyS'){
      event.preventDefault();
      this.commitActors();
      this.creator.setStatus('角色資料已儲存');
      return true;
    }
    return false;
  }
}

    this.objectDragMode='scale';

    this.toolkit=null;
    this.hint=null;
    this.windowDrag=null;
    this.windowStates={
      toolkit:{initialized:false,minimized:false,x:0,y:0,w:760,h:184},
      buildPanel:{initialized:false,minimized:false,x:0,y:76,w:374,h:520}
    };

    this.selectionHelper=null;
    this.raycaster=new THREE.Raycaster();
    this.pointer=new THREE.Vector2();
    this.groundPlane=new THREE.Plane(new THREE.Vector3(0,1,0),0);

    this.textureTarget=null;

      this.app.world.load(snapshot);
      this.app.world.saveLocal();
      if(this.selectedId&&!this.app.world.getObject(this.selectedId)) this.selectedId=null;
      this.refresh();
    });
    this.bindCanvas();
    this.bindPanels();
  }
  enable(){
    this.ensureGrid();
    this.ensureSelectionHelper();
    this.ensureOverlays();
    this.gridHelper.visible=true;
    this.controlTarget=this.selectedId?'object':'player';
    this.refresh();
  }
  disable(){
    if(this.gridHelper) this.gridHelper.visible=false;
    if(this.selectionHelper) this.selectionHelper.visible=false;
    if(this.toolkit) this.toolkit.hidden=true;
    if(this.hint) this.hint.hidden=true;
    this.drag=null;
    this.windowDrag=null;
    this.toolkitOpen=false;
  }
  ensureGrid(){
    if(this.gridHelper) return;
    this.gridHelper=new THREE.GridHelper(80,80,0x5eead4,0x35465f);
    this.gridHelper.material.transparent=true;
    this.gridHelper.material.opacity=.35;
    this.gridHelper.position.y=.01;
    this.app.scene.add(this.gridHelper);
  }
  ensureSelectionHelper(){
    if(this.selectionHelper) return;
    this.selectionHelper=new THREE.BoxHelper(new THREE.Object3D(),0xf6c453);
    this.app.scene.add(this.selectionHelper);
  }
  ensureOverlays(){
    if(this.toolkit&&this.hint) return;
    this.toolkit=document.createElement('div');
    this.toolkit.className='world-toolkit';
    this.toolkit.hidden=true;
    this.toolkit.addEventListener('pointerdown',event=>this.handleFloatingPointerDown(event));
    this.toolkit.addEventListener('click',event=>{
      const windowAction=event.target.closest('[data-world-window-action]')?.dataset.worldWindowAction;
      if(windowAction){
        this.handleWindowAction(windowAction,event.target.closest('[data-window-key]')?.dataset.windowKey);
        return;
      }
      const tool=event.target.closest('[data-world-toolkit]')?.dataset.worldToolkit;
      if(!tool) return;
      this.setTool(tool);
      this.toolkitOpen=false;
      this.refresh();
    });
    this.hint=document.createElement('div');
    this.hint.className='world-hint';
    this.hint.hidden=true;
    document.body.appendChild(this.toolkit);
    document.body.appendChild(this.hint);
  }
  windowElement(key){
    return key==='toolkit'?this.toolkit:this.right;
  }
  ensureFloatingState(key,element){
    const state=this.windowStates[key];
    if(state.initialized) return state;
    const maxW=Math.max(300,window.innerWidth-24);
    const maxH=Math.max(120,window.innerHeight-88);
    if(key==='toolkit'){
      state.w=Math.min(760,maxW);
      state.h=Math.min(220,maxH);
      state.x=clamp((window.innerWidth-state.w)*.5,12,Math.max(12,window.innerWidth-92));
      state.y=clamp(window.innerHeight-state.h-82,76,Math.max(76,window.innerHeight-52));
    }else{
      state.w=Math.min(374,maxW);
      state.h=Math.min(560,maxH);
      state.x=clamp(window.innerWidth-state.w-12,12,Math.max(12,window.innerWidth-92));
      state.y=76;
    }
    state.initialized=true;
    this.applyFloatingState(key,element);
    return state;
  }
  applyFloatingState(key,element=this.windowElement(key)){
    if(!element) return;
    const state=this.ensureFloatingState(key,element);
    const visibleW=state.minimized?160:Math.min(state.w,window.innerWidth-24);
    const visibleH=state.minimized?42:Math.min(state.h,window.innerHeight-88);
    state.x=clamp(state.x,12,Math.max(12,window.innerWidth-80));
    state.y=clamp(state.y,64,Math.max(64,window.innerHeight-42));
    element.style.left=`${state.x}px`;
    element.style.top=`${state.y}px`;
    element.style.right='auto';
    element.style.bottom='auto';
    element.style.width=`${visibleW}px`;
    element.style.height=`${visibleH}px`;
    element.classList.toggle('is-minimized',!!state.minimized);
  }
  floatingChrome(key,title){
    const state=this.windowStates[key];
    const label=state.minimized?'展開':'最小化';
    const symbol=state.minimized?'□':'_';
    return `
      <div class="world-window-titlebar" data-window-drag="${key}">
        <div class="world-window-title">${escapeHTML(title)}</div>
        <div class="world-window-actions">
          <button type="button" title="${label}" data-window-key="${key}" data-world-window-action="minimize">${symbol}</button>
        </div>
      </div>`;
  }
  floatingWindowHTML(key,title,body){
    const state=this.windowStates[key];
    return `${this.floatingChrome(key,title)}${state.minimized?'':`<div class="world-window-content">${body}</div>`}`;
  }
  handleWindowAction(action,key){
    if(action!=='minimize'||!this.windowStates[key]) return;
    const state=this.windowStates[key];
    state.minimized=!state.minimized;
    this.applyFloatingState(key);
    this.refresh();
  }
  handleFloatingPointerDown(event){
    const titlebar=event.target.closest('[data-window-drag]');
    if(!titlebar||event.target.closest('button,input,select,textarea')) return;
    const key=titlebar.dataset.windowDrag;
    const element=this.windowElement(key);
    if(!element) return;
    const state=this.ensureFloatingState(key,element);
    const rect=element.getBoundingClientRect();
    state.x=rect.left;
    state.y=rect.top;
    if(!state.minimized){
      state.w=rect.width;
      state.h=rect.height;
    }
    this.windowDrag={key,startX:event.clientX,startY:event.clientY,x:state.x,y:state.y};
    event.preventDefault();
    event.stopPropagation();
  }
  bindCanvas(){
    const canvas=this.app.canvas;
    canvas.addEventListener('pointerdown',event=>this.onPointerDown(event),true);
    window.addEventListener('pointermove',event=>this.onPointerMove(event),true);

  bindPanels(){

    this.left.addEventListener('input',event=>this.handleInput(event));
    this.right.addEventListener('input',event=>this.handleInput(event));
    $('#asset-file-input').addEventListener('change',event=>this.handleAssetFile(event));

  canControlPlayer(){

  debugState(){

  renderToolkit(){
