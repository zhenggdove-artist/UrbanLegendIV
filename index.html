        </div>
        <p class="muted">目前素材：${escapeHTML(model.fileName||'基本模型')}｜PNG 幀數 ${sequenceCount}</p>
      </div>
      <div class="creator-section">
        <h2>動作序列</h2>
        ${role.actions.map(action=>`
          <div class="creator-row">
            <div class="row-title">${escapeHTML(action.name)}</div>
            <div class="creator-grid four">
              <label>名稱<input data-actor-action-id="${action.id}" data-actor-action-field="name" value="${escapeHTML(action.name)}"></label>
              <label>起始<input data-actor-action-id="${action.id}" data-actor-action-field="from" type="number" min="0" step="1" value="${action.frames?.from??0}"></label>
              <label>結束<input data-actor-action-id="${action.id}" data-actor-action-field="to" type="number" min="0" step="1" value="${action.frames?.to??0}"></label>
              <label>FPS<input data-actor-action-id="${action.id}" data-actor-action-field="fps" type="number" min="1" step="1" value="${action.fps??8}"></label>
            </div>
          </div>`).join('')}
      </div>
      <div class="creator-section">
        <h2>互動</h2>
        <label>互動訊息<input data-actor-interaction-field="message" value="${escapeHTML(role.interaction?.message||'')}"></label>
        <div class="creator-grid two">
          <label>互動方式<select data-actor-interaction-field="onInteract">
            ${['message','score','damage'].map(type=>`<option value="${type}" ${role.interaction?.onInteract===type?'selected':''}>${type==='message'?'顯示訊息':type==='score'?'增加分數':'造成傷害'}</option>`).join('')}
          </select></label>
          <label>關係值<input data-actor-interaction-field="affinity" type="number" step="1" value="${role.interaction?.affinity??0}"></label>
        </div>
      </div>
      ${this.role==='npc'?this.renderNPCPanel(npc):''}`;
  }
  renderNPCPanel(npc){
    if(!npc){
      return `
        <div class="creator-section">
          <h2>NPC 實例</h2>
          <p class="muted">請新增或選取一個 NPC 實例。</p>
        </div>`;
    }
    return `
      <div class="creator-section">
        <h2>NPC 實例</h2>
        <label>名稱<input data-actor-npc-field="name" value="${escapeHTML(npc.name)}"></label>
        <div class="creator-grid three">
          ${axisActorInputs('position',npc.position,'位置')}
        </div>
        <div class="creator-grid three">
          ${axisActorInputs('rotation',npc.rotation,'旋轉')}
        </div>
        <div class="creator-grid two">
          <label>互動半徑<input data-actor-npc-field="radius" type="number" min="0.1" step="0.05" value="${npc.radius??0.75}"></label>
          <label class="inline-check"><input data-actor-npc-field="enabled" type="checkbox" ${npc.enabled!==false?'checked':''}> 啟用</label>
        </div>
      </div>`;
  }
  handleClick(event){
    const role=event.target.closest('[data-actor-role]')?.dataset.actorRole;
    if(role){
      this.role=role;
      this.app.actors.data.selectedRole=role;
      this.app.actors.saveLocal();
      this.refresh();
      return;
    }
    const npcId=event.target.closest('[data-actor-npc]')?.dataset.actorNpc;
    if(npcId){
      this.selectedNPC=npcId;
      this.role='npc';
      this.app.actors.data.selectedRole='npc';
      this.refresh();
      return;
    }
    const action=event.target.closest('[data-actor-action]')?.dataset.actorAction;
    if(!action) return;
    if(action==='import-png') this.requestImport('png');
    if(action==='import-gltf') this.requestImport('gltf');
    if(action==='reset-model') this.setRoleModel({type:'primitive',src:'',fileName:'',sequence:[]});
    if(action==='save'){this.commitActors();this.creator.setStatus('角色資料已儲存');}
    if(action==='add-npc'){
      const npc=this.app.actors.addNPCNearPlayer();
      this.selectedNPC=npc.id;
      this.role='npc';
      this.app.actors.data.selectedRole='npc';
      this.refresh();
    }
    if(action==='remove-npc'&&this.selectedNPC){
      this.app.actors.removeNPC(this.selectedNPC);
      this.selectedNPC=this.app.actors.data.npcs[0]?.id||null;
      this.refresh();
    }
    if(action==='export-actors') this.creator.openJsonModal({title:'匯出角色 JSON',value:JSON.stringify(this.app.actors.serialize(),null,2)});
    if(action==='import-actors') this.creator.openJsonModal({title:'匯入角色 JSON',value:'',applyLabel:'匯入',onApply:text=>{
      this.app.actors.load(JSON.parse(text));
      this.app.actors.saveLocal();
      this.role=this.app.actors.data.selectedRole||'player';
      this.selectedNPC=this.app.actors.data.npcs[0]?.id||null;
      this.refresh();
    }});
  }
  handleInput(event){
    const role=this.roleData();
    const roleField=event.target.dataset.actorRoleField;
    const modelField=event.target.dataset.actorModelField;
    const interactionField=event.target.dataset.actorInteractionField;
    const actionId=event.target.dataset.actorActionId;
    const actionField=event.target.dataset.actorActionField;
    const npcField=event.target.dataset.actorNpcField;
    if(roleField){
      role[roleField]=this.inputValue(event.target,role[roleField]);
      this.commitActors(false);
      this.refresh();
      return;
    }
    if(modelField){
      role.model=role.model||{};
      role.model[modelField]=this.inputValue(event.target,role.model[modelField]);
      this.commitActors(false);
      this.refresh();
      return;
    }
    if(interactionField){
      role.interaction=role.interaction||{};
      role.interaction[interactionField]=this.inputValue(event.target,role.interaction[interactionField]);
      this.commitActors(false);
      this.refresh();
      return;
    }
    if(actionId&&actionField){
      const action=role.actions.find(item=>item.id===actionId);
      if(action){
        if(actionField==='from'||actionField==='to'){
          action.frames=action.frames||{from:0,to:0};
          action.frames[actionField]=Math.max(0,Math.round(toNumber(event.target.value,0)));
        }else{
          action[actionField]=this.inputValue(event.target,action[actionField]);
        }
        this.commitActors(false);
        this.refresh();
      }
      return;
    }
    if(npcField){
      const npc=this.selectedNPCData();
      if(!npc) return;
      setPath(npc,npcField,this.inputValue(event.target,getPath(npc,npcField)));
      this.app.actors.rebuildNPCs();
      this.app.actors.saveLocal();
      this.refresh();
    }
  }
  inputValue(input,fallback){
    if(input.type==='checkbox') return input.checked;
    if(input.type==='number') return toNumber(input.value,fallback);
    return input.value;
  }
  commitActors(refresh=true){
    this.app.actors.data.selectedRole=this.role;
    this.app.actors.rebuildPlayer();
    this.app.actors.rebuildNPCs();
    this.app.actors.saveLocal();
    if(refresh) this.refresh();
  }
  requestImport(kind){
    this.pendingImport={kind,role:this.role};
    this.fileInput.multiple=kind==='png';
    this.fileInput.accept=kind==='png'?'image/png,.png':'.glb,.gltf,.fbx,model/gltf+json,model/gltf-binary';
    this.fileInput.click();
  }
  async handleActorFile(event){
    const files=Array.from(event.target.files||[]);
    event.target.value='';
    const pending=this.pendingImport;
    this.pendingImport=null;
    if(!pending||!files.length) return;
    const previousRole=this.role;
    this.role=pending.role;
    if(pending.kind==='png'){
      const pngs=files.filter(file=>/\.png$/i.test(file.name)||file.type==='image/png').sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true}));
      const sequence=await Promise.all(pngs.map(file=>this.readFile(file)));
      if(sequence.length){
        this.setRoleModel({type:'spriteSequence',src:sequence[0],sequence,fileName:`${sequence.length} 張 PNG`,billboard:true});
      }
    }else{
      const file=files[0];
      const src=await this.readFile(file);
      const type=/\.fbx$/i.test(file.name)?'fbx':'gltf';
      this.setRoleModel({type,src,fileName:file.name,sequence:[]});
    }
    this.role=previousRole;
    this.refresh();
  }
  readFile(file){
    return new Promise((resolve,reject)=>{
      const reader=new FileReader();
      reader.onload=()=>resolve(String(reader.result||''));
      reader.onerror=()=>reject(reader.error);
      reader.readAsDataURL(file);
    });
  }
  setRoleModel(model){
    const role=this.roleData();
    role.model={...role.model,...model};
    this.commitActors();
  }
  handleKeyDown(event){
    if(isEditable(document.activeElement)) return false;
    if((event.ctrlKey||event.metaKey)&&event.code==='KeyS'){
      event.preventDefault();
      this.commitActors();
      this.creator.setStatus('角色資料已儲存');
      return true;
    }
    return false;
  }
}

class WorldBuilder{
  constructor(app,creator){
    this.app=app;
    this.creator=creator;
    this.left=$('[data-world-left]',creator.root);
    this.right=$('[data-world-right]',creator.root);
    this.selectedId=null;
    this.tool='block';
    this.controlTarget='player';
    this.objectDragMode='scale';
    this.toolkitOpen=false;
    this.toolkit=null;
    this.hint=null;
    this.windowDrag=null;
    this.windowStates={
      toolkit:{initialized:false,minimized:false,x:0,y:0,w:760,h:184},
      buildPanel:{initialized:false,minimized:false,x:0,y:76,w:374,h:520}
    };
    this.gridHelper=null;
    this.selectionHelper=null;
    this.raycaster=new THREE.Raycaster();
    this.pointer=new THREE.Vector2();
    this.groundPlane=new THREE.Plane(new THREE.Vector3(0,1,0),0);
    this.drag=null;
    this.textureTarget=null;
    this.toolKeys=Object.keys(WORLD_TYPE_DEFS);
    this.right.classList.add('float-panel');
    this.history=new HistoryStack(()=>this.app.world.serialize(),snapshot=>{
      this.app.world.load(snapshot);
      this.app.world.saveLocal();
      if(this.selectedId&&!this.app.world.getObject(this.selectedId)) this.selectedId=null;
      this.refresh();
    });
    this.bindCanvas();
    this.bindPanels();
  }
  enable(){
    this.ensureGrid();
    this.ensureSelectionHelper();
    this.ensureOverlays();
    this.gridHelper.visible=true;
    this.controlTarget=this.selectedId?'object':'player';
    this.refresh();
  }
  disable(){
    if(this.gridHelper) this.gridHelper.visible=false;
    if(this.selectionHelper) this.selectionHelper.visible=false;
    if(this.toolkit) this.toolkit.hidden=true;
    if(this.hint) this.hint.hidden=true;
    this.drag=null;
    this.windowDrag=null;
    this.toolkitOpen=false;
  }
  ensureGrid(){
    if(this.gridHelper) return;
    this.gridHelper=new THREE.GridHelper(80,80,0x5eead4,0x35465f);
    this.gridHelper.material.transparent=true;
    this.gridHelper.material.opacity=.35;
    this.gridHelper.position.y=.01;
    this.app.scene.add(this.gridHelper);
  }
  ensureSelectionHelper(){
    if(this.selectionHelper) return;
    this.selectionHelper=new THREE.BoxHelper(new THREE.Object3D(),0xf6c453);
    this.app.scene.add(this.selectionHelper);
  }
  ensureOverlays(){
    if(this.toolkit&&this.hint) return;
    this.toolkit=document.createElement('div');
    this.toolkit.className='world-toolkit';
    this.toolkit.hidden=true;
    this.toolkit.addEventListener('pointerdown',event=>this.handleFloatingPointerDown(event));
    this.toolkit.addEventListener('click',event=>{
      const windowAction=event.target.closest('[data-world-window-action]')?.dataset.worldWindowAction;
      if(windowAction){
        this.handleWindowAction(windowAction,event.target.closest('[data-window-key]')?.dataset.windowKey);
        return;
      }
      const tool=event.target.closest('[data-world-toolkit]')?.dataset.worldToolkit;
      if(!tool) return;
      this.setTool(tool);
      this.toolkitOpen=false;
      this.refresh();
    });
    this.hint=document.createElement('div');
    this.hint.className='world-hint';
    this.hint.hidden=true;
    document.body.appendChild(this.toolkit);
    document.body.appendChild(this.hint);
  }
  windowElement(key){
    return key==='toolkit'?this.toolkit:this.right;
  }
  ensureFloatingState(key,element){
    const state=this.windowStates[key];
    if(state.initialized) return state;
    const maxW=Math.max(300,window.innerWidth-24);
    const maxH=Math.max(120,window.innerHeight-88);
    if(key==='toolkit'){
      state.w=Math.min(760,maxW);
      state.h=Math.min(220,maxH);
      state.x=clamp((window.innerWidth-state.w)*.5,12,Math.max(12,window.innerWidth-92));
      state.y=clamp(window.innerHeight-state.h-82,76,Math.max(76,window.innerHeight-52));
    }else{
      state.w=Math.min(374,maxW);
      state.h=Math.min(560,maxH);
      state.x=clamp(window.innerWidth-state.w-12,12,Math.max(12,window.innerWidth-92));
      state.y=76;
    }
    state.initialized=true;
    this.applyFloatingState(key,element);
    return state;
  }
  applyFloatingState(key,element=this.windowElement(key)){
    if(!element) return;
    const state=this.ensureFloatingState(key,element);
    const visibleW=state.minimized?160:Math.min(state.w,window.innerWidth-24);
    const visibleH=state.minimized?42:Math.min(state.h,window.innerHeight-88);
    state.x=clamp(state.x,12,Math.max(12,window.innerWidth-80));
    state.y=clamp(state.y,64,Math.max(64,window.innerHeight-42));
    element.style.left=`${state.x}px`;
    element.style.top=`${state.y}px`;
    element.style.right='auto';
    element.style.bottom='auto';
    element.style.width=`${visibleW}px`;
    element.style.height=`${visibleH}px`;
    element.classList.toggle('is-minimized',!!state.minimized);
  }
  floatingChrome(key,title){
    const state=this.windowStates[key];
    const label=state.minimized?'展開':'最小化';
    const symbol=state.minimized?'□':'_';
    return `
      <div class="world-window-titlebar" data-window-drag="${key}">
        <div class="world-window-title">${escapeHTML(title)}</div>
        <div class="world-window-actions">
          <button type="button" title="${label}" data-window-key="${key}" data-world-window-action="minimize">${symbol}</button>
        </div>
      </div>`;
  }
  floatingWindowHTML(key,title,body){
    const state=this.windowStates[key];
    return `${this.floatingChrome(key,title)}${state.minimized?'':`<div class="world-window-content">${body}</div>`}`;
  }
  handleWindowAction(action,key){
    if(action!=='minimize'||!this.windowStates[key]) return;
    const state=this.windowStates[key];
    state.minimized=!state.minimized;
    this.applyFloatingState(key);
    this.refresh();
  }
  handleFloatingPointerDown(event){
    const titlebar=event.target.closest('[data-window-drag]');
    if(!titlebar||event.target.closest('button,input,select,textarea')) return;
    const key=titlebar.dataset.windowDrag;
    const element=this.windowElement(key);
    if(!element) return;
    const state=this.ensureFloatingState(key,element);
    const rect=element.getBoundingClientRect();
    state.x=rect.left;
    state.y=rect.top;
    if(!state.minimized){
      state.w=rect.width;
      state.h=rect.height;
    }
    this.windowDrag={key,startX:event.clientX,startY:event.clientY,x:state.x,y:state.y};
    event.preventDefault();
    event.stopPropagation();
  }
  bindCanvas(){
    const canvas=this.app.canvas;
    canvas.addEventListener('pointerdown',event=>this.onPointerDown(event),true);
    window.addEventListener('pointermove',event=>this.onPointerMove(event),true);
    window.addEventListener('pointerup',event=>this.onPointerUp(event),true);
  }
  bindPanels(){
    this.left.addEventListener('click',event=>this.handleClick(event));
    this.right.addEventListener('click',event=>this.handleClick(event));
    this.right.addEventListener('pointerdown',event=>this.handleFloatingPointerDown(event));
    this.left.addEventListener('input',event=>this.handleInput(event));
    this.right.addEventListener('input',event=>this.handleInput(event));
    $('#asset-file-input').addEventListener('change',event=>this.handleAssetFile(event));
  }
  canControlPlayer(){
    return this.controlTarget==='player'&&!this.drag&&!isEditable(document.activeElement);
  }
  debugState(){
    return {
      tool:this.tool,
      controlTarget:this.controlTarget,
      selectedId:this.selectedId,
      dragMode:this.objectDragMode,
      toolkitOpen:this.toolkitOpen
    };
  }
  refresh(){
    if(!this.creator.active||this.creator.mode!=='world') return;
    this.renderLeft();
    this.renderRight();
    this.renderToolkit();
    this.updateSelectionHelper();
    this.updateHint();
    const count=this.app.world.data.objects.length;
    const grid=this.app.world.data.settings.gridSize;
    const target=this.controlTarget==='player'?'角色走位':'物件調整';
    this.creator.setStatus(`空間編輯｜${target}｜工具 ${this.toolLabel(this.tool)}｜物件 ${count}｜格線 ${grid}`);
  }
  toolLabel(tool){
    return tool==='select'?'選取/拖拉':(WORLD_TYPE_DEFS[tool]?.label||tool);
  }
  setTool(tool){
    this.tool=WORLD_TYPE_DEFS[tool]||tool==='select'?tool:'block';
    if(tool!=='select') this.setControlTarget('player',{refresh:false});
  }
  setControlTarget(target,{refresh=true}={}){
    this.controlTarget=target==='object'&&this.selectedId?'object':'player';
    if(this.controlTarget==='player') this.selectedId=null;
    this.updateSelectionHelper();
    if(refresh) this.refresh();
  }
  setDragMode(mode){
    this.objectDragMode=mode==='move'?'move':'scale';
    this.refresh();
  }
  renderToolkit(){
    if(!this.toolkit) return;
    this.applyFloatingState('toolkit',this.toolkit);
    const entries=[['select',{label:'選取/拖拉'}],...Object.entries(WORLD_TYPE_DEFS)];
    const body=`
      <div class="world-window-help">可拖曳標題列移動，右下角可縮放。按 E 會把目前工具安裝在角色前方。</div>
      <div class="world-toolkit-grid">
        ${entries.map(([type,def],index)=>`
          <button type="button" class="${type===this.tool?'is-active':''}" data-world-toolkit="${type}">
            ${index<10?`${index===0?'0':index}. `:''}${escapeHTML(def.label)}
          </button>`).join('')}
      </div>`;
    this.toolkit.innerHTML=this.floatingWindowHTML('toolkit','工具包',body);
    this.toolkit.hidden=!this.toolkitOpen||!this.creator.active||this.creator.mode!=='world';
  }
  updateHint(){
    if(!this.hint) return;
    if(!this.creator.active||this.creator.mode!=='world'){
      this.hint.hidden=true;
      return;
    }
    const object=this.app.world.getObject(this.selectedId);
    this.hint.hidden=false;
    if(object&&this.controlTarget==='object'){
      const mode=this.objectDragMode==='scale'?'尺寸':'位置';
      this.hint.textContent=`已選取「${object.name}」：拖曳物件調整${mode}。G 切到移動、V 切到尺寸、Delete 刪除，點角色或空白處回到角色走位。`;
    }else{
      this.hint.textContent=`角色走位建造：WASD / 方向鍵移動，滑鼠拖曳視角，B 或 Tab 開工具包，E 在角色前方安裝「${this.toolLabel(this.tool)}」。`;
    }
  }
  renderLeft(){
    const current=this.toolLabel(this.tool);
    this.left.innerHTML=`
      <div class="creator-section">
        <h2>建造工具包</h2>
        <div class="creator-grid three">
          <button type="button" data-world-action="toggle-toolkit">${this.toolkitOpen?'收起工具包':'開啟工具包'}</button>
          <button type="button" data-world-action="place-current">安裝目前工具</button>
          <button type="button" data-world-action="select-player">回到角色</button>
          <button type="button" data-world-action="undo">復原</button>
          <button type="button" data-world-action="redo">重做</button>
          <button type="button" data-world-tool="select">選取/拖拉</button>
        </div>
        <p class="muted">目前工具：${escapeHTML(current)}。按 B 或 Tab 可叫出底部工具包，按 E 直接安裝在角色前方。</p>
        <div class="creator-palette">
          ${Object.entries(WORLD_TYPE_DEFS).map(([type,def])=>`<button type="button" data-world-tool="${type}">${escapeHTML(def.label)}</button>`).join('')}
        </div>
      </div>
      <div class="creator-section">
        <h2>拖拉模式</h2>
        <div class="creator-grid two">
          <button type="button" data-world-action="drag-scale" class="${this.objectDragMode==='scale'?'is-active':''}">尺寸拖拉</button>
          <button type="button" data-world-action="drag-move" class="${this.objectDragMode==='move'?'is-active':''}">移動拖拉</button>
        </div>
      </div>
      <div class="creator-section">
        <h2>格線</h2>
        <div class="creator-grid two">
          <label>大小<input data-world-setting="gridSize" type="number" min="0.05" step="0.05" value="${this.app.world.data.settings.gridSize}"></label>
          <label class="inline-check"><input data-world-setting="snap" type="checkbox" ${this.app.world.data.settings.snap?'checked':''}> 吸附</label>
        </div>
      </div>
      <div class="creator-section">
        <h2>物件列表</h2>
        <div class="creator-list">
          ${this.app.world.data.objects.map(object=>`
            <div class="creator-row ${object.id===this.selectedId?'is-selected':''}" data-world-select="${object.id}">
              <div>
                <div class="row-title">${escapeHTML(object.name)}</div>
                <div class="row-meta">${escapeHTML(WORLD_TYPE_DEFS[object.type]?.label||object.type)}</div>
              </div>
              <span class="row-meta">${object.flags.collidable?'碰撞':'顯示'}</span>
            </div>`).join('')||'<p class="muted">尚無物件</p>'}
        </div>
      </div>`;
    $$('[data-world-tool]',this.left).forEach(button=>button.classList.toggle('is-active',button.dataset.worldTool===this.tool));
  }
  renderRight(){
    const object=this.app.world.getObject(this.selectedId);
    if(!object){
      const body=`
        <div class="creator-section">
          <h2>角色走位建造</h2>
          <div class="creator-grid two">

        </div>`;
      this.applyFloatingState('buildPanel',this.right);

    }
    const skin=object.material.skin||{};

    const body=`

          <button type="button" data-world-action="drag-move" class="${this.objectDragMode==='move'?'is-active':''}">拖拉位置</button>

      </div>

        <h2>變換</h2>

        <div class="creator-grid three">
          ${axisInputs('transform.rotation',object.transform.rotation,'旋轉')}
        </div>
        <div class="creator-grid three">
          ${axisInputs('size',object.size,'尺寸',.05)}
        </div>
        <div class="creator-grid three">
          ${axisInputs('transform.scale',object.transform.scale,'縮放',.05)}
        </div>
      </div>
      <div class="creator-section">
        <h2>材質</h2>
        <div class="creator-grid two">
          <label>顏色<input data-world-field="material.color" type="color" value="${object.material.color||'#ffffff'}"></label>
          <label>透明度<input data-world-field="material.opacity" type="number" min="0" max="1" step="0.05" value="${object.material.opacity??1}"></label>
        </div>
        <label>貼圖模式<select data-world-field="material.skin.mode">
          ${['color','stretch','repeat','single','perFace'].map(mode=>`<option value="${mode}" ${skin.mode===mode?'selected':''}>${SKIN_MODE_LABELS[mode]}</option>`).join('')}
        </select></label>
        <div class="creator-grid two">
          <button type="button" data-world-action="upload-texture">上傳貼圖</button>
          <button type="button" data-world-action="clear-texture">清除貼圖</button>
        </div>
        <div class="creator-grid three">
          <label>橫向重複<input data-world-field="material.skin.repeat.x" type="number" min="0.05" step="0.05" value="${skin.repeat?.x??1}"></label>
          <label>直向重複<input data-world-field="material.skin.repeat.y" type="number" min="0.05" step="0.05" value="${skin.repeat?.y??1}"></label>

          <button type="button" data-world-action="upload-face-texture">上傳單面</button>
          <button type="button" data-world-action="clear-face-texture">清除單面</button>
        </div>
      </div>
      <div class="creator-section">
        <h2>遊戲邏輯</h2>
        <div class="creator-grid two">
          ${flagInput('collidable',object.flags.collidable)}
          ${flagInput('destructible',object.flags.destructible)}
          ${flagInput('interactive',object.flags.interactive)}
          ${flagInput('trigger',object.flags.trigger)}
          ${flagInput('spawn',object.flags.spawn)}
        </div>
        <div class="creator-grid two">
          <label>生命值<input data-world-field="logic.health" type="number" min="0" step="1" value="${object.logic.health??1}"></label>
          <label>訊息<input data-world-field="logic.message" value="${escapeHTML(object.logic.message||'')}"></label>
        </div>
        <label>文字<textarea data-world-field="logic.text">${escapeHTML(object.logic.text||'')}</textarea></label>
        <div class="creator-grid two">

        </div>
      </div>`;
    this.applyFloatingState('buildPanel',this.right);
    this.right.innerHTML=this.floatingWindowHTML('buildPanel','物件調整',body);
  }
  handleClick(event){
    const windowAction=event.target.closest('[data-world-window-action]')?.dataset.worldWindowAction;
    if(windowAction){
      this.handleWindowAction(windowAction,event.target.closest('[data-window-key]')?.dataset.windowKey);
      return;
    }
    const tool=event.target.closest('[data-world-tool]')?.dataset.worldTool;
    if(tool){this.setTool(tool);this.refresh();return;}
    const select=event.target.closest('[data-world-select]')?.dataset.worldSelect;
    if(select){this.select(select);return;}
    const action=event.target.closest('[data-world-action]')?.dataset.worldAction;
    if(!action) return;
    if(action==='toggle-toolkit'){this.toggleToolkit();return;}
    if(action==='select-player'){this.setControlTarget('player');return;}
    if(action==='place-current'){this.placeCurrentTool();return;}
    if(action==='drag-scale'){this.setDragMode('scale');return;}
    if(action==='drag-move'){this.setDragMode('move');return;}
    if(action==='undo'){this.history.undo();return;}
    if(action==='redo'){this.history.redo();return;}
    if(action==='duplicate') this.duplicate();
    if(action==='delete') this.deleteSelected();
    if(action==='clear-world') this.clearWorld();
    if(action==='export-world') this.creator.openJsonModal({title:'匯出世界 JSON',value:JSON.stringify(this.app.world.serialize(),null,2)});
    if(action==='import-world') this.creator.openJsonModal({title:'匯入世界 JSON',value:'',applyLabel:'匯入',onApply:text=>{this.history.capture();this.app.world.load(JSON.parse(text));this.app.world.saveLocal();this.selectedId=null;this.setControlTarget('player',{refresh:false});this.refresh();}});
    if(action==='upload-texture') this.requestTexture({kind:'main'});
    if(action==='clear-texture') this.setTexture('');
    if(action==='upload-face-texture') this.requestTexture({kind:'face'});
    if(action==='clear-face-texture') this.setFaceTexture('');
  }
  handleInput(event){
    const setting=event.target.dataset.worldSetting;
    if(setting){
      if(setting==='gridSize') this.app.world.data.settings.gridSize=Math.max(.05,toNumber(event.target.value,.5));
      if(setting==='snap') this.app.world.data.settings.snap=event.target.checked;
      this.app.world.saveLocal();
      this.refresh();
      return;
    }
    const field=event.target.dataset.worldField;
    const flag=event.target.dataset.worldFlag;
    if(!field&&!flag) return;
    const object=this.app.world.getObject(this.selectedId);
    if(!object) return;
    this.history.capture();
    if(flag){
      object.flags[flag]=event.target.checked;
      if(flag==='destructible'&&object.flags[flag]&&!object.logic.health) object.logic.health=3;
    }else{
      setPath(object,field,event.target.type==='number'?toNumber(event.target.value):event.target.value);
      if(field==='type'){
        const def=WORLD_TYPE_DEFS[object.type]||WORLD_TYPE_DEFS.block;
        object.name=object.name||def.label;
        object.flags={collidable:false,destructible:false,interactive:false,trigger:false,spawn:false,...def.flags,...object.flags};
      }
    }
    this.app.world.rebuild();
    this.app.world.saveLocal();
    this.updateSelectionHelper();
    if(field==='type'||flag) this.refresh();
  }
  handleAssetFile(event){
    const file=event.target.files?.[0];
    event.target.value='';
    if(!file||!this.textureTarget) return;
    const reader=new FileReader();
    reader.onload=()=> {
      if(this.textureTarget.owner==='world'){
        if(this.textureTarget.kind==='face') this.setFaceTexture(String(reader.result||''));
        else this.setTexture(String(reader.result||''));
      }else if(this.textureTarget.owner==='ui'){
        this.creator.uiEditor.setImage(String(reader.result||''));
      }
      this.textureTarget=null;
    };
    reader.readAsDataURL(file);
  }
  requestTexture(target){
    this.textureTarget={owner:'world',...target};
    $('#asset-file-input').click();
  }
  setTexture(src){
    const object=this.app.world.getObject(this.selectedId);
    if(!object) return;
    this.history.capture();
    object.material.skin.src=src;
    if(src&&object.material.skin.mode==='color') object.material.skin.mode='stretch';
    this.app.world.rebuild();
    this.app.world.saveLocal();
    this.refresh();
  }
  setFaceTexture(src){
    const object=this.app.world.getObject(this.selectedId);
    if(!object) return;
    this.history.capture();
    const face=object.material.skin.singleFace||'pz';
    object.material.skin.faces=object.material.skin.faces||{};
    if(src) object.material.skin.faces[face]=src;
    else delete object.material.skin.faces[face];
    object.material.skin.mode='perFace';
    this.app.world.rebuild();
    this.app.world.saveLocal();
    this.refresh();
  }
  select(id){
    this.selectedId=id;
    this.controlTarget=id?'object':'player';
    this.updateSelectionHelper();
    this.refresh();
  }
  toggleToolkit(force=null){
    this.toolkitOpen=force===null?!this.toolkitOpen:!!force;
    this.renderToolkit();
    this.updateHint();
  }
  placeCurrentTool(position=null){
    const type=this.tool==='select'?'block':this.tool;
    this.addObjectAt(type,position||this.addPositionNearPlayer());
  }
  addObjectAt(type,position){
    const def=WORLD_TYPE_DEFS[type]||WORLD_TYPE_DEFS.block;
    const object=makeWorldObject(type);
    const grid=this.app.world.data.settings.gridSize||.5;
    const useSnap=this.app.world.data.settings.snap;
    object.transform.position.x=useSnap?snap(position.x,grid):position.x;
    object.transform.position.z=useSnap?snap(position.z,grid):position.z;
    object.transform.position.y=position.y!==undefined?Math.max(def.size.y*.5,position.y):def.size.y*.5;
    this.history.capture();
    this.app.world.addObject(object);
    this.select(object.id);
  }
  addPositionNearPlayer(){
    const forward=this.app.getCameraForward();
    const right=this.app.getCameraRight(forward);
    const base=this.app.player.position.clone().addScaledVector(forward,2.2);
    if(this.app.world.data.settings.snap){
      const grid=this.app.world.data.settings.gridSize||.5;
      base.x=snap(base.x,grid);
      base.z=snap(base.z,grid);
    }
    base.y=0;
    return base.addScaledVector(right,0);
  }
  duplicate(){
    if(!this.selectedId) return;
    this.history.capture();
    const copy=this.app.world.duplicateObject(this.selectedId);
    if(copy) this.select(copy.id);
  }
  deleteSelected(){
    if(!this.selectedId) return;
    this.history.capture();
    this.app.world.removeObject(this.selectedId);
    this.selectedId=null;
    this.setControlTarget('player');
  }
  clearWorld(){
    if(!confirm('要清空所有世界物件嗎？')) return;
    this.history.capture();
    this.app.world.clear();
    this.selectedId=null;
    this.setControlTarget('player');
  }
  handleKeyDown(event){
    if(isEditable(document.activeElement)) return false;
    if((event.ctrlKey||event.metaKey)&&event.code==='KeyZ'){event.preventDefault();this.history.undo();return true;}
    if((event.ctrlKey||event.metaKey)&&(event.code==='KeyY'||(event.shiftKey&&event.code==='KeyZ'))){event.preventDefault();this.history.redo();return true;}
    if((event.ctrlKey||event.metaKey)&&event.code==='KeyD'){event.preventDefault();this.duplicate();return true;}
    if((event.ctrlKey||event.metaKey)&&event.code==='KeyS'){event.preventDefault();this.app.saveProject();this.creator.setStatus('專案已儲存');return true;}
    if(event.code==='Tab'||event.code==='KeyB'){event.preventDefault();this.toggleToolkit();return true;}
    if(event.code==='KeyE'){event.preventDefault();this.placeCurrentTool();return true;}
    if(event.code==='KeyG'){event.preventDefault();this.setDragMode('move');return true;}
    if(event.code==='KeyV'){event.preventDefault();this.setDragMode('scale');return true;}
    if(event.code==='Escape'&&this.toolkitOpen){event.preventDefault();this.toggleToolkit(false);return true;}
    if(/^Digit[0-9]$/.test(event.code)){
      const index=Number(event.code.replace('Digit',''));
      const entries=['select',...this.toolKeys];
      if(entries[index]){event.preventDefault();this.setTool(entries[index]);this.toolkitOpen=false;this.refresh();return true;}
    }
    if((event.code==='Delete'||event.code==='Backspace')&&this.selectedId){event.preventDefault();this.deleteSelected();return true;}
    const object=this.app.world.getObject(this.selectedId);
    if(object&&this.controlTarget==='object'&&['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(event.code)){
      event.preventDefault();
      this.history.capture();
      const step=(event.shiftKey?4:1)*(this.app.world.data.settings.gridSize||.5);
      if(event.code==='ArrowUp') object.transform.position.z-=step;
      if(event.code==='ArrowDown') object.transform.position.z+=step;
      if(event.code==='ArrowLeft') object.transform.position.x-=step;
      if(event.code==='ArrowRight') object.transform.position.x+=step;
      this.app.world.rebuild();
      this.app.world.saveLocal();
      this.refresh();
      return true;
    }
    if(['KeyW','KeyA','KeyS','KeyD','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(event.code)&&this.canControlPlayer()) return false;
    return false;
  }
  updatePointer(event){
    const rect=this.app.canvas.getBoundingClientRect();
    this.pointer.x=((event.clientX-rect.left)/Math.max(1,rect.width))*2-1;
    this.pointer.y=-((event.clientY-rect.top)/Math.max(1,rect.height))*2+1;
    this.raycaster.setFromCamera(this.pointer,this.app.camera);
  }
  pointerGround(event){
    this.updatePointer(event);
    const hit=new THREE.Vector3();
    if(this.raycaster.ray.intersectPlane(this.groundPlane,hit)) return hit;
    return null;
  }
  pickPlayer(){
    const player=this.app.player.mesh;
    const hits=this.raycaster.intersectObject(player,true);
    return hits.length>0;
  }
  onPointerDown(event){
    if(!this.creator.active||this.creator.mode!=='world'||event.target!==this.app.canvas) return;
    this.updatePointer(event);
    if(this.pickPlayer()){
      event.preventDefault();
      event.stopPropagation();
      this.setControlTarget('player');
      return;
    }
    const picked=this.app.world.pick(this.raycaster);
    if(picked){
      if(picked.object?.type==='floor'){
        this.setControlTarget('player');
        return;
      }
      event.preventDefault();
      event.stopPropagation();
      this.select(picked.id);
      const object=this.app.world.getObject(this.selectedId);
      const ground=this.pointerGround(event);
      if(object){
        this.history.capture();
        this.drag={
          id:this.selectedId,
          mode:this.objectDragMode,
          startX:event.clientX,
          startY:event.clientY,
          startSize:deepClone(object.size),
          startScale:deepClone(object.transform.scale),
          startPosition:deepClone(object.transform.position),
          offset:ground?{x:object.transform.position.x-ground.x,z:object.transform.position.z-ground.z}:null
        };
      }
      return;
    }
    const ground=this.pointerGround(event);
    if(!ground) return;
    this.setControlTarget('player');
  }
  onPointerMove(event){
    if(this.windowDrag){
      const state=this.windowStates[this.windowDrag.key];
      const element=this.windowElement(this.windowDrag.key);
      if(state&&element){
        state.x=this.windowDrag.x+(event.clientX-this.windowDrag.startX);
        state.y=this.windowDrag.y+(event.clientY-this.windowDrag.startY);
        this.applyFloatingState(this.windowDrag.key,element);
      }
      event.preventDefault();
      event.stopPropagation();
      return;
    }
    if(!this.drag||!this.creator.active||this.creator.mode!=='world') return;
    event.preventDefault();
    event.stopPropagation();
    const object=this.app.world.getObject(this.drag.id);
    if(!object) return;
    if(this.drag.mode==='move'){
      const ground=this.pointerGround(event);
      if(!ground||!this.drag.offset) return;
      const grid=this.app.world.data.settings.gridSize||.5;
      const useSnap=this.app.world.data.settings.snap;
      object.transform.position.x=useSnap?snap(ground.x+this.drag.offset.x,grid):ground.x+this.drag.offset.x;
      object.transform.position.z=useSnap?snap(ground.z+this.drag.offset.z,grid):ground.z+this.drag.offset.z;
    }else{
      const dx=event.clientX-this.drag.startX;
      const dy=event.clientY-this.drag.startY;
      const grid=this.app.world.data.settings.gridSize||.5;
      const widthDelta=dx*.015;
      const heightDelta=-dy*.015;
      object.size.x=Math.max(.05,this.drag.startSize.x+widthDelta);
      object.size.z=Math.max(.05,this.drag.startSize.z+widthDelta);
      object.size.y=Math.max(.05,this.drag.startSize.y+heightDelta);
      if(this.app.world.data.settings.snap){
        object.size.x=Math.max(grid,snap(object.size.x,grid));
        object.size.y=Math.max(grid,snap(object.size.y,grid));
        object.size.z=Math.max(grid,snap(object.size.z,grid));
      }
      object.transform.position.y=object.size.y*.5;
    }
    this.app.world.rebuild();
    this.updateSelectionHelper();
    this.updateHint();
  }
  onPointerUp(){
    if(this.windowDrag){
      this.windowDrag=null;
      return;
    }
    if(!this.drag) return;
    this.drag=null;
    this.app.world.saveLocal();
    this.refresh();
  }
  updateSelectionHelper(){
    if(!this.selectionHelper) return;
    const root=this.app.world.meshes.get(this.selectedId);
    if(root&&this.creator.active&&this.creator.mode==='world'){
      this.selectionHelper.setFromObject(root);
      this.selectionHelper.visible=true;
    }else{
      this.selectionHelper.visible=false;
    }
  }
}

function axisInputs(path,value,label,min=null){
  return ['x','y','z'].map(axis=>`<label>${label} ${axis.toUpperCase()}<input data-world-field="${path}.${axis}" type="number" step="0.05" ${min!==null?`min="${min}"`:''} value="${value?.[axis]??0}"></label>`).join('');
}
function axisActorInputs(path,value,label){
  return ['x','y','z'].map(axis=>`<label>${label} ${axis.toUpperCase()}<input data-actor-npc-field="${path}.${axis}" type="number" step="0.05" value="${value?.[axis]??0}"></label>`).join('');
}
function flagInput(name,checked){
  return `<label class="inline-check"><input data-world-flag="${name}" type="checkbox" ${checked?'checked':''}> ${FLAG_LABELS[name]||name}</label>`;
}
function getPath(object,path){
  return path.split('.').reduce((target,key)=>target?.[key],object);
}
function setPath(object,path,value){
  const parts=path.split('.');
  let target=object;
  while(parts.length>1){
    const key=parts.shift();
    target[key]=target[key]||{};
    target=target[key];
  }
  target[parts[0]]=value;
}

class UIEditor{
  constructor(app,creator){
    this.app=app;
    this.creator=creator;
    this.left=$('[data-ui-left]',creator.root);
    this.right=$('[data-ui-right]',creator.root);
    this.layer=$('[data-ui-editor-layer]',creator.root);
    this.screen='game';
    this.selectedId=null;
    this.drag=null;
    this.history=new HistoryStack(()=>this.app.ui.serialize(),snapshot=>{
      this.app.ui.load(snapshot);
      this.app.ui.saveLocal();
      if(this.selectedId&&!this.app.ui.getElement(this.selectedId)) this.selectedId=null;
      this.refresh();
    });
    this.bind();
  }
  bind(){
    this.left.addEventListener('click',event=>this.handleClick(event));
    this.right.addEventListener('click',event=>this.handleClick(event));
    this.left.addEventListener('input',event=>this.handleInput(event));
    this.right.addEventListener('input',event=>this.handleInput(event));
    this.layer.addEventListener('pointerdown',event=>this.onBoxPointerDown(event));
    window.addEventListener('pointermove',event=>this.onPointerMove(event),true);
    window.addEventListener('pointerup',event=>this.onPointerUp(event),true);
  }
  enable(){
    this.layer.hidden=false;
    this.app.ui.previewScreen=this.screen;
    this.app.ui.render();
    this.refresh();
  }
  disable(){
    this.layer.hidden=true;
    this.layer.innerHTML='';
    this.drag=null;
    this.app.ui.previewScreen=null;
    this.app.ui.render();
  }
  refresh(){
    if(!this.creator.active||this.creator.mode!=='ui') return;
    this.renderLeft();
    this.renderRight();
    this.refreshBoxes();
    const count=this.app.ui.data.elements.filter(element=>element.screen===this.screen).length;
    this.creator.setStatus(`介面編輯｜畫面 ${SCREEN_LABELS[this.screen]||this.screen}｜元件 ${count}`);
  }
  renderLeft(){
    const elements=this.app.ui.data.elements.filter(element=>element.screen===this.screen);
    this.left.innerHTML=`
      <div class="creator-section">
        <h2>畫面</h2>
        <div class="creator-grid three">
          ${['game','loading','results'].map(screen=>`<button type="button" data-ui-screen="${screen}">${SCREEN_LABELS[screen]}</button>`).join('')}
        </div>
      </div>
      <div class="creator-section">
        <h2>新增元件</h2>
        <div class="creator-palette">
          ${Object.entries(UI_TYPE_DEFS).map(([type,def])=>`<button type="button" data-ui-add="${type}">${escapeHTML(def.label)}</button>`).join('')}
        </div>
      </div>
      <div class="creator-section">
        <h2>操作</h2>
        <div class="creator-grid two">
          <button type="button" data-ui-action="undo">復原</button>
          <button type="button" data-ui-action="redo">重做</button>
          <button type="button" data-ui-action="export-ui">匯出介面</button>
          <button type="button" data-ui-action="import-ui">匯入介面</button>
        </div>
      </div>
      <div class="creator-section">
        <h2>元件列表</h2>
        <div class="creator-list">
          ${elements.sort((a,b)=>a.z-b.z).map(element=>`
            <div class="creator-row ${element.id===this.selectedId?'is-selected':''} ${element.visible===false?'is-hidden':''}" data-ui-select="${element.id}">
              <div>
                <div class="row-title">${escapeHTML(element.name)}</div>
                <div class="row-meta">${escapeHTML(UI_TYPE_DEFS[element.type]?.label||element.type)}</div>
              </div>
              <span class="row-meta">Z ${element.z}</span>
            </div>`).join('')||'<p class="muted">尚無介面元件</p>'}
        </div>
      </div>`;
    $$('[data-ui-screen]',this.left).forEach(button=>button.classList.toggle('is-active',button.dataset.uiScreen===this.screen));
  }
  renderRight(){
    const element=this.app.ui.getElement(this.selectedId);
    if(!element){
      this.right.innerHTML=`
        <div class="creator-section">
          <h2>選取</h2>
          <p class="muted">請從預覽畫面或列表選取介面元件。</p>
        </div>`;
      return;
    }
    this.right.innerHTML=`
      <div class="creator-section">
        <h2>元件</h2>
        <div class="creator-grid two">
          <button type="button" data-ui-action="duplicate">複製</button>
          <button type="button" data-ui-action="delete" class="danger">刪除</button>
          <button type="button" data-ui-action="upload-image">上傳圖片</button>
          <button type="button" data-ui-action="clear-image">清除圖片</button>
        </div>
        <label>名稱<input data-ui-field="name" value="${escapeHTML(element.name)}"></label>
        <div class="creator-grid two">
          <label>類型<select data-ui-field="type">${Object.keys(UI_TYPE_DEFS).map(type=>`<option value="${type}" ${element.type===type?'selected':''}>${UI_TYPE_DEFS[type].label}</option>`).join('')}</select></label>
          <label>畫面<select data-ui-field="screen">${['game','loading','results'].map(screen=>`<option value="${screen}" ${element.screen===screen?'selected':''}>${SCREEN_LABELS[screen]}</option>`).join('')}</select></label>
        </div>
      </div>
      <div class="creator-section">
        <h2>版面</h2>
        <div class="creator-grid four">
          ${['x','y','w','h'].map(key=>`<label>${key.toUpperCase()} %<input data-ui-field="${key}" type="number" step="0.1" value="${element[key]}"></label>`).join('')}
        </div>
        <div class="creator-grid three">
          <label>層級<input data-ui-field="z" type="number" step="1" value="${element.z}"></label>
          <label>透明度<input data-ui-field="opacity" type="number" min="0" max="1" step="0.05" value="${element.opacity}"></label>
          <label>圓角<input data-ui-field="radius" type="number" min="0" step="1" value="${element.radius}"></label>
        </div>
        <div class="creator-grid two">
          <label class="inline-check"><input data-ui-flag="visible" type="checkbox" ${element.visible!==false?'checked':''}> 顯示</label>
          <label class="inline-check"><input data-ui-flag="locked" type="checkbox" ${element.locked?'checked':''}> 鎖定</label>
        </div>
      </div>
      <div class="creator-section">
        <h2>樣式</h2>
        <label>文字<textarea data-ui-field="text">${escapeHTML(element.text||'')}</textarea></label>
        <div class="creator-grid two">
          <label>字體大小<input data-ui-field="fontSize" type="number" min="6" step="1" value="${element.fontSize}"></label>
          <label>資料綁定<select data-ui-field="bind">${['none','score','health','message','action','restart'].map(bind=>`<option value="${bind}" ${element.bind===bind?'selected':''}>${BIND_LABELS[bind]}</option>`).join('')}</select></label>
          <label>文字顏色<input data-ui-field="color" type="color" value="${cssColorToHex(element.color,'#eef4ff')}"></label>
          <label>背景<input data-ui-field="bgColor" value="${escapeHTML(element.bgColor)}"></label>
          <label>邊框<input data-ui-field="borderColor" value="${escapeHTML(element.borderColor)}"></label>
          <label>比例<select data-ui-field="frameAspect">${['free','16:9','4:3','1:1','9:16'].map(aspect=>`<option value="${aspect}" ${element.frameAspect===aspect?'selected':''}>${aspect==='free'?'自由':aspect}</option>`).join('')}</select></label>
        </div>
      </div>`;
  }
  refreshBoxes(){
    if(!this.creator.active||this.creator.mode!=='ui'||this.layer.hidden) return;
    this.layer.innerHTML='';
    for(const element of this.app.ui.data.elements){
      if(element.screen!==this.screen||element.visible===false) continue;
      const box=document.createElement('div');
      box.className=`ui-editor-box ${element.id===this.selectedId?'is-selected':''}`;
      box.dataset.uiBox=element.id;
      Object.assign(box.style,this.rectStyle(element));
      box.style.zIndex=String(1000+element.z);
      box.innerHTML=`<div class="ui-editor-label">${escapeHTML(element.name)}</div>${['nw','ne','se','sw'].map(corner=>`<span class="ui-handle ${corner}" data-ui-handle="${corner}"></span>`).join('')}`;
      this.layer.appendChild(box);
    }
  }
  rectStyle(element){
    return {left:`${element.x}%`,top:`${element.y}%`,width:`${element.w}%`,height:`${element.h}%`};
  }
  handleClick(event){
    const screen=event.target.closest('[data-ui-screen]')?.dataset.uiScreen;
    if(screen){this.screen=screen;this.app.ui.previewScreen=screen;this.selectedId=null;this.app.ui.render();this.refresh();return;}
    const add=event.target.closest('[data-ui-add]')?.dataset.uiAdd;
    if(add){this.addElement(add);return;}
    const select=event.target.closest('[data-ui-select]')?.dataset.uiSelect;
    if(select){this.select(select);return;}
    const action=event.target.closest('[data-ui-action]')?.dataset.uiAction;
    if(!action) return;
    if(action==='undo'){this.history.undo();return;}
    if(action==='redo'){this.history.redo();return;}
    if(action==='duplicate') this.duplicate();
    if(action==='delete') this.deleteSelected();
    if(action==='upload-image') this.requestImage();
    if(action==='clear-image') this.setImage('');
    if(action==='export-ui') this.creator.openJsonModal({title:'匯出介面 JSON',value:JSON.stringify(this.app.ui.serialize(),null,2)});
    if(action==='import-ui') this.creator.openJsonModal({title:'匯入介面 JSON',value:'',applyLabel:'匯入',onApply:text=>{this.history.capture();this.app.ui.load(JSON.parse(text));this.app.ui.saveLocal();this.selectedId=null;this.refresh();}});
  }
  handleInput(event){
    const element=this.app.ui.getElement(this.selectedId);
    if(!element) return;
    const flag=event.target.dataset.uiFlag;
    const field=event.target.dataset.uiField;
    if(!flag&&!field) return;
    this.history.capture();
    if(flag) element[flag]=event.target.checked;
    if(field){
      const numeric=['x','y','w','h','z','opacity','radius','fontSize'];
      element[field]=numeric.includes(field)?toNumber(event.target.value,element[field]):event.target.value;
      if(field==='frameAspect') this.applyAspect(element);
      if(field==='screen') this.screen=element.screen;
    }
    this.app.ui.render();
    this.app.ui.saveLocal();
    this.refresh();
  }
  addElement(type){
    const element=makeUIElement(type,{screen:this.screen,x:10+this.app.ui.data.elements.length%8*2,y:12+this.app.ui.data.elements.length%8*2,z:20+this.app.ui.data.elements.length});
    this.history.capture();
    this.app.ui.addElement(element);
    this.select(element.id);
  }
  select(id){
    this.selectedId=id;
    this.refresh();
  }
  duplicate(){
    if(!this.selectedId) return;
    this.history.capture();
    const copy=this.app.ui.duplicateElement(this.selectedId);
    if(copy) this.select(copy.id);
  }
  deleteSelected(){
    if(!this.selectedId) return;
    this.history.capture();
    this.app.ui.removeElement(this.selectedId);
    this.selectedId=null;
    this.refresh();
  }
  requestImage(){
    this.creator.worldBuilder.textureTarget={owner:'ui'};
    $('#asset-file-input').click();
  }
  setImage(src){
    const element=this.app.ui.getElement(this.selectedId);
    if(!element) return;
    this.history.capture();
    element.image=src;
    this.app.ui.render();
    this.app.ui.saveLocal();
    this.refresh();
  }
  applyAspect(element){
    const map={'16:9':16/9,'4:3':4/3,'1:1':1,'9:16':9/16};
    const ratio=map[element.frameAspect];
    if(!ratio) return;
    const widthPx=window.innerWidth*element.w/100;
    const heightPx=widthPx/ratio;
    element.h=clamp(heightPx/window.innerHeight*100,1,100);
  }
  handleKeyDown(event){
    if(isEditable(document.activeElement)) return false;
    if((event.ctrlKey||event.metaKey)&&event.code==='KeyZ'){event.preventDefault();this.history.undo();return true;}
    if((event.ctrlKey||event.metaKey)&&(event.code==='KeyY'||(event.shiftKey&&event.code==='KeyZ'))){event.preventDefault();this.history.redo();return true;}
    if((event.ctrlKey||event.metaKey)&&event.code==='KeyD'){event.preventDefault();this.duplicate();return true;}
    if((event.ctrlKey||event.metaKey)&&event.code==='KeyS'){event.preventDefault();this.app.saveProject();this.creator.setStatus('專案已儲存');return true;}
    if(event.code==='Delete'||event.code==='Backspace'){event.preventDefault();this.deleteSelected();return true;}
    const element=this.app.ui.getElement(this.selectedId);
    if(element&&['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(event.code)){
      event.preventDefault();
      this.history.capture();
      const step=event.shiftKey?1:.2;
      if(event.code==='ArrowUp') element.y-=step;
      if(event.code==='ArrowDown') element.y+=step;
      if(event.code==='ArrowLeft') element.x-=step;
      if(event.code==='ArrowRight') element.x+=step;
      this.clampElement(element);
      this.app.ui.render();
      this.app.ui.saveLocal();
      this.refresh();
      return true;
    }
    return true;
  }
  onBoxPointerDown(event){
    const box=event.target.closest('[data-ui-box]');
    if(!box) return;
    const element=this.app.ui.getElement(box.dataset.uiBox);
    if(!element||element.locked) return;
    event.preventDefault();
    event.stopPropagation();
    this.select(element.id);
    this.history.capture();
    const rect=box.getBoundingClientRect();
    this.drag={
      id:element.id,
      mode:event.target.dataset.uiHandle?'resize':'move',
      handle:event.target.dataset.uiHandle||'',
      startX:event.clientX,
      startY:event.clientY,
      start:{x:element.x,y:element.y,w:element.w,h:element.h},
      rect
    };
  }
  onPointerMove(event){
    if(!this.drag||!this.creator.active||this.creator.mode!=='ui') return;
    const element=this.app.ui.getElement(this.drag.id);
    if(!element) return;
    event.preventDefault();
    const dxPct=(event.clientX-this.drag.startX)/window.innerWidth*100;
    const dyPct=(event.clientY-this.drag.startY)/window.innerHeight*100;
    if(this.drag.mode==='move'){
      element.x=this.drag.start.x+dxPct;
      element.y=this.drag.start.y+dyPct;
    }else{
      const handle=this.drag.handle;
      if(handle.includes('e')) element.w=this.drag.start.w+dxPct;
      if(handle.includes('s')) element.h=this.drag.start.h+dyPct;
      if(handle.includes('w')){element.x=this.drag.start.x+dxPct;element.w=this.drag.start.w-dxPct;}
      if(handle.includes('n')){element.y=this.drag.start.y+dyPct;element.h=this.drag.start.h-dyPct;}
    }
    this.clampElement(element);
    this.app.ui.render();
    this.refreshBoxes();
  }
  onPointerUp(){
    if(!this.drag) return;
    this.drag=null;
    this.app.ui.saveLocal();
    this.refresh();
  }
  clampElement(element){
    element.w=clamp(element.w,1,100);
    element.h=clamp(element.h,1,100);
    element.x=clamp(element.x,-element.w+1,99);
    element.y=clamp(element.y,-element.h+1,99);
    element.opacity=clamp(element.opacity,0,1);
  }
}

function cssColorToHex(value,fallback){
  if(/^#[0-9a-f]{6}$/i.test(value||'')) return value;
  return fallback;
}

const app=new GameApp();
app.start();
</script>
</body>
</html>
